{n:259,q:"반정규화의 방법으로 테이블을 수직분할 할 때 얻을 수 있는 장점으로 보기 어려운 것은?",c:["조회와 갱신 처리 중심의 칼럼들을 분할하여 레코드 잠금 현상 최소화","특별히 자주 조회되는 칼럼들을 분할하여 I/O 처리 성능 향상","특정 칼럼 크기가 아주 큰 경우의 수직분할은 조인 처리 감소","특정 칼럼에 보안을 적용하기가 용이"],a:2,ex:"특정 칼럼 크기가 아주 큰 경우의 수직분할은 I/O 성능 향상에 유리. '조인 처리 감소'는 수직분할의 장점이 아님."},
{n:260,q:"반정규화의 일환으로 중복 칼럼을 생성하는 상황으로 보기 어려운 것은?",c:["여러 개의 로우로 구성되는 값을 하나의 로우에 칼럼으로 나열하여 관리","부모 테이블에 집계 칼럼을 추가","접근 경로 단축을 위해 부모 테이블의 칼럼을 자식 테이블에 복사","검색 조건으로 자주 사용되는 칼럼을 모아 인덱스로 생성"],a:3,ex:"인덱스 생성은 엄밀한 의미에서 반정규화로 보지 않음. 중복 칼럼 생성 상황과 거리가 멀다."},
],
};
const SUBJECTS=[
  {id:1,label:'과목 1',name:'전사아키텍처 이해',color:'#6c63ff',bg:'rgba(108,99,255,.12)'},
  {id:2,label:'과목 2',name:'데이터 요건 분석',color:'#22c55e',bg:'rgba(34,197,94,.12)'},
  {id:3,label:'과목 3',name:'데이터 표준화',color:'#f59e0b',bg:'rgba(245,158,11,.12)'},
  {id:4,label:'과목 4',name:'데이터 모델링',color:'#ec4899',bg:'rgba(236,72,153,.12)'},
  {id:0,label:'전체',name:'전체 랜덤 (1+2+3)',color:'#a78bfa',bg:'rgba(167,139,250,.12)'},
];
const S={
  page:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',padding:'0 16px 40px'},
  card:{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'20px'},
  btn:{display:'block',width:'100%',padding:'14px 20px',borderRadius:'var(--radius)',fontSize:15,fontWeight:600,letterSpacing:'-.2px'},
};
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function buildQuiz(sid,mode){
  let pool=sid===0?[...Q[1],...Q[2],...Q[3]]:[...Q[sid]];
  pool=shuffle(pool);
  if(mode==='rand20')pool=pool.slice(0,Math.min(20,pool.length));
  return pool;
}
function HomeScreen({onStart}){
  const[selSubj,setSelSubj]=useState(null);
  const[selMode,setSelMode]=useState('all');
  const canStart=selSubj!==null;
  function go(){
    if(!canStart)return;
    const pool=buildQuiz(selSubj,selMode);
    if(!pool.length){alert('문제가 없습니다.');return;}
    onStart(pool,selSubj,selMode);
  }
  return(
    <div style={{...S.page,paddingTop:32,maxWidth:480,width:'100%',margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:32}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:3,color:'var(--muted)',textTransform:'uppercase',marginBottom:10}}>Data Architecture Professional</div>
        <h1 style={{fontSize:30,fontWeight:700,letterSpacing:-1,lineHeight:1.2,marginBottom:8}}>DAsP 퀴즈</h1>
        <p style={{color:'var(--muted)',fontSize:14}}>과목을 선택하고 퀴즈를 시작하세요</p>
      </div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:10,marginBottom:20}}>
        {SUBJECTS.map((s,i)=>{
          const cnt=s.id===0?Q[1].length+Q[2].length+Q[3].length:(Q[s.id]?.length??0);
          const sel=selSubj===s.id;
          return(
            <button key={s.id} onClick={()=>setSelSubj(s.id)} style={{...S.card,display:'flex',alignItems:'center',gap:14,textAlign:'left',background:sel?s.bg:'var(--surface)',border:`1px solid ${sel?s.color:'var(--border)'}`,cursor:'pointer',padding:'16px 20px'}}>
              <div style={{width:42,height:42,borderRadius:10,background:s.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{fontSize:10,fontWeight:800,color:s.color,letterSpacing:0.5}}>{s.label}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600,color:'var(--text)',marginBottom:2}}>{s.name}</div>
                <div style={{fontSize:12,color:'var(--muted)'}}>{cnt}문제</div>
              </div>
              {sel&&<div style={{width:18,height:18,borderRadius:'50%',background:s.color,display:'flex',alignItems:'center',justifyContent:'center'}}><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg></div>}
            </button>
          );
        })}
      </div>
      <div style={{width:'100%',marginBottom:20}}>
        <div style={{fontSize:12,color:'var(--muted)',fontWeight:600,letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>출제 방식</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[{id:'all',label:'전체 문제',sub:'순서 랜덤'},{id:'rand20',label:'20문제 랜덤',sub:'빠른 복습'}].map(m=>(
            <button key={m.id} onClick={()=>setSelMode(m.id)} style={{...S.card,textAlign:'left',padding:'14px 16px',background:selMode===m.id?'rgba(108,99,255,.12)':'var(--surface)',border:`1px solid ${selMode===m.id?'var(--accent)':'var(--border)'}`,cursor:'pointer'}}>
              <div style={{fontSize:14,fontWeight:600,color:selMode===m.id?'var(--accent-2)':'var(--text)',marginBottom:2}}>{m.label}</div>
              <div style={{fontSize:12,color:'var(--muted)'}}>{m.sub}</div>
            </button>
          ))}
        </div>
      </div>
      <button onClick={go} disabled={!canStart} style={{...S.btn,background:canStart?'var(--accent)':'var(--border)',color:canStart?'#fff':'var(--muted)',cursor:canStart?'pointer':'not-allowed'}}>퀴즈 시작 →</button>
    </div>
  );
}
function QuizScreen({quiz,subjId,onFinish,onHome}){
  const[idx,setIdx]=useState(0);
  const[sel,setSel]=useState(null);
  const[answered,setAnswered]=useState(false);
  const[scores,setScores]=useState([]);
  const q=quiz[idx];const total=quiz.length;
  const subj=SUBJECTS.find(s=>s.id===subjId)??SUBJECTS[3];
  const pct=Math.round((idx/total)*100);
  const NUMS=['①','②','③','④'];
  function handleSel(i){
    if(answered)return;
    setSel(i);setAnswered(true);
    setScores(prev=>[...prev,i===q.a]);
  }
  function next(){
    const newScores=[...scores,scores[scores.length-1]];
    if(idx+1>=total){onFinish(newScores);}
    else{setIdx(i=>i+1);setSel(null);setAnswered(false);}
  }
  return(
    <div style={{...S.page,paddingTop:20,maxWidth:480,width:'100%',margin:'0 auto'}}>
      <div style={{width:'100%',display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
        <button onClick={onHome} style={{background:'none',border:'1px solid var(--border)',borderRadius:8,padding:'6px 12px',fontSize:13,color:'var(--muted)'}}>← 홈</button>
        <div style={{flex:1}}>
          <div style={{height:4,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:subj.color,borderRadius:2,transition:'width .4s'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:11,color:'var(--muted)'}}>
            <span>{idx+1} / {total}</span>
            <span>정답 {scores.filter(Boolean).length}</span>
          </div>
        </div>
      </div>
      <div style={{...S.card,width:'100%',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <span style={{display:'inline-flex',alignItems:'center',padding:'3px 10px',borderRadius:6,fontSize:12,fontWeight:700,background:subj.bg,color:subj.color}}>Q{q.n}</span>
        </div>
        <p style={{fontSize:15,lineHeight:1.7,fontWeight:500,wordBreak:'keep-all',color:'var(--text)'}}>{q.q}</p>
      </div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
        {q.c.map((txt,i)=>{
          let bg='var(--surface)',border='var(--border)',color='var(--text)';
          if(answered){
            if(i===q.a){bg='rgba(34,197,94,.15)';border='var(--success)';color='#86efac';}
            else if(i===sel){bg='rgba(239,68,68,.15)';border='var(--danger)';color='#fca5a5';}
            else{color='var(--muted)';}
          }
          return(
            <button key={i} onClick={()=>handleSel(i)} style={{...S.card,display:'flex',alignItems:'flex-start',gap:10,textAlign:'left',cursor:answered?'default':'pointer',background:bg,border:`1px solid ${border}`,padding:'14px 16px'}}>
              <span style={{flexShrink:0,fontSize:14,fontWeight:700,color:answered&&i===q.a?'var(--success)':answered&&i===sel?'var(--danger)':'var(--muted)'}}>{NUMS[i]}</span>
              <span style={{fontSize:14,lineHeight:1.55,color,wordBreak:'keep-all'}}>{txt}</span>
            </button>
          );
        })}
      </div>
      {answered&&(
        <div style={{width:'100%',background:sel===q.a?'rgba(34,197,94,.08)':'rgba(239,68,68,.08)',border:`1px solid ${sel===q.a?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)'}`,borderRadius:'var(--radius)',padding:'14px 16px',marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:sel===q.a?'var(--success)':'var(--danger)',marginBottom:6}}>{sel===q.a?'✓ 정답':'✗ 오답'}</div>
          <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.65,wordBreak:'keep-all'}}>{q.ex}</p>
        </div>
      )}
      {answered&&(
        <button onClick={next} style={{...S.btn,background:subj.color,color:'#fff'}}>{idx+1<total?'다음 문제 →':'결과 보기 →'}</button>
      )}
    </div>
  );
}
function ResultScreen({scores,quiz,subjId,onRetry,onHome}){
  const total=scores.length;const correct=scores.filter(Boolean).length;
  const pct=Math.round((correct/total)*100);
  const subj=SUBJECTS.find(s=>s.id===subjId)??SUBJECTS[3];
  const grade=pct>=90?{label:'완벽해요!',emoji:'🎯',color:'#22c55e'}:pct>=70?{label:'잘했어요!',emoji:'👍',color:'#6c63ff'}:pct>=50?{label:'더 노력해요',emoji:'📖',color:'#f59e0b'}:{label:'다시 공부해요',emoji:'💪',color:'#ef4444'};
  return(
    <div style={{...S.page,paddingTop:40,maxWidth:480,width:'100%',margin:'0 auto'}}>
      <div style={{width:140,height:140,borderRadius:'50%',border:`3px solid ${grade.color}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <div style={{fontSize:36,fontWeight:700,color:grade.color}}>{pct}%</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{correct}/{total} 정답</div>
      </div>
      <h2 style={{fontSize:22,fontWeight:700,marginBottom:6,letterSpacing:-0.5}}>{grade.emoji} {grade.label}</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginBottom:32}}>{subj.name}</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,width:'100%',marginBottom:24}}>
        {[{label:'정답',value:correct,color:'var(--success)'},{label:'오답',value:total-correct,color:'var(--danger)'},{label:'정확도',value:pct+'%',color:subj.color}].map(s=>(
          <div key={s.label} style={{...S.card,textAlign:'center',padding:'16px 10px'}}>
            <div style={{fontSize:22,fontWeight:700,color:s.color,marginBottom:4}}>{s.value}</div>
            <div style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>
      {scores.some(s=>!s)&&(
        <div style={{width:'100%',marginBottom:24}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase',marginBottom:10}}>오답 복습</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {quiz.map((q,i)=>!scores[i]&&(
              <div key={i} style={{...S.card,padding:'12px 14px'}}>
                <div style={{fontSize:12,color:'var(--danger)',fontWeight:600,marginBottom:5}}>Q{q.n}</div>
                <p style={{fontSize:13,color:'var(--text)',marginBottom:6,lineHeight:1.55,wordBreak:'keep-all'}}>{q.q}</p>
                <p style={{fontSize:12,color:'var(--success)'}}>정답: {['①','②','③','④'][q.a]} {q.c[q.a]}</p>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:8}}>
        <button onClick={onRetry} style={{...S.btn,background:subj.color,color:'#fff'}}>다시 풀기</button>
        <button onClick={onHome} style={{...S.btn,background:'none',color:'var(--muted)',border:'1px solid var(--border)'}}>홈으로</button>
      </div>
    </div>
  );
}
function App(){
  const[screen,setScreen]=useState('home');
  const[quiz,setQuiz]=useState([]);
  const[subjId,setSubjId]=useState(null);
  const[mode,setMode]=useState('all');
  const[scores,setScores]=useState([]);
  function handleStart(pool,sid,m){setQuiz(pool);setSubjId(sid);setMode(m);setScores([]);setScreen('quiz');}
  function handleFinish(s){setScores(s);setScreen('result');}
  function handleRetry(){const p=buildQuiz(subjId,mode);setQuiz(p);setScores([]);setScreen('quiz');}
  function goHome(){setScreen('home');}
  return(
    <>
      {screen==='home'&&<HomeScreen onStart={handleStart}/>}
      {screen==='quiz'&&<QuizScreen quiz={quiz} subjId={subjId} onFinish={handleFinish} onHome={goHome}/>}
      {screen==='result'&&<ResultScreen scores={scores} quiz={quiz} subjId={subjId} onRetry={handleRetry} onHome={goHome}/>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
