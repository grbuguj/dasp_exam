<title>DAsP 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f13;--surface:#17171e;--border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:#7a7a90;--accent:#6c63ff;--accent-2:#a78bfa;--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--radius:14px}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;outline:none;transition:all .18s}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState}=React;

const Q={
1:[
{n:1,q:"EA의 개념에 대한 설명 중 가장 부적합한 것은?",c:["EA 도입은 IT에 대한 혁신과 관리·통제를 포함하며 시스템의 도입, 구축, 운영, 평가 등을 통합적으로 관리하는 것을 의미한다.","EA는 IT와 업무간의 연계뿐만 아니라 현재의 모습과 미래의 모습을 포함한다.","EA 도입의 궁극적인 목적은 IT 투자 대비 효과를 최대화하는 것이다.","EA 도입의 핵심은 통합성과 상호운영성의 제고이다. 따라서 모든 기업은 EA 도입의 핵심 목적으로 통합성과 상호운영성을 설정한다."],a:3,ex:"모든 기업이 통합성·상호운용성을 핵심 목적으로 설정하는 것은 아님."},
{n:2,q:"아키텍처의 3가지 구성요소로 가장 거리가 먼 것은?",c:["사람(Human)","모델(Model)","원칙(Rule)","계획(Plan)"],a:3,ex:"아키텍처 3요소 = 사람+모델+원칙. 계획(Plan)은 구성요소가 아님."},
{n:3,q:"전사(Enterprise)의 정의와 거리가 가장 먼 것은?",c:["전사는 기업이나 기관과 동일한 의미이다.","하나의 기업은 여러 개의 전사로 구성될 수 있다.","전사는 구분 가능한 다수의 사업 영역으로 구성된다.","EA 수립에 관련된 모든 활동은 정의된 전사의 성과와 목표에 초점을 두어야 한다."],a:0,ex:"전사 ≠ 기업과 동일한 의미. 하나의 기업이 여러 전사로 구성될 수 있음."},
{n:4,q:"전사(Enterprise)에 대한 개념으로 틀린 것은?",c:["전사의 범위를 고려하기 위해서는 외부 객체(고객, 제휴업체, 유관기관 등)와의 역학관계를 반드시 고려해야 한다.","한 개의 기업 및 기관을 여러 개의 전사로 구분할 수는 없다.","전사는 계층구조(Hierarchy)를 가질 수 있다.","자회사를 보유하고 있는 모기업의 경우 전체 그룹사를 전사의 범위로 선정할 수 있다."],a:1,ex:"한 기업을 여러 전사로 구분 가능. '구분할 수 없다'는 틀린 설명."},
{n:5,q:"DAP가 EA 관련하여 수행해야 할 일에 대한 설명으로 가장 부적절한 것은?",c:["EA 프로젝트의 데이터아키텍처(DA) 정의 담당자로 참여하는 것은 바람직하다.","EA 프로젝트를 수행할 때 EA 팀원이나 지원 인력으로 배정되지 않으면 관련이 없다.","구축된 EA 원칙과 정보를 준수 및 활용해야 하고, 담당하고 있는 데이터 모델의 변경 정보가 EA 정보에 반영될 수 있도록 조치할 의무가 있다.","EA 프로젝트가 진행되지 않더라도 필요시에 데이터 부문만의 아키텍처 정립 작업을 수행할 수도 있다."],a:1,ex:"EA 팀원이 아니어도 DA 담당자는 EA와 관련이 있음."},
{n:6,q:"EA 프레임워크에 대한 설명으로 틀린 것은?",c:["자크만(Zachman) 프레임워크는 다섯 가지 관점과 여섯 가지 묘사방법을 통하여 EA를 모델 형식으로 제시한다.","미연방정부 프레임워크(FEAF)는 참조모델(BRM, DRM, SRM, TRM, PRM) 기반의 EA 프레임워크이다.","미 국방성의 아키텍처 프레임워크(DoDAF)는 효과적인 작전수행을 위해 무기 체계간의 상호운용성을 보장하기 위해 도입된 프레임워크이다.","오픈그룹의 EA 프레임워크(TOGAF)는 목표아키텍처를 구축하기 위해 아키텍처 개발 프로세스 및 계획자, 소유자, 설계자, 개발자 관점의 구체적인 아키텍처 모델(매트릭스)을 제공한다."],a:3,ex:"TOGAF는 ADM 프로세스를 제공. 매트릭스 모델은 Zachman의 특징."},
{n:7,q:"아키텍처 매트릭스에 대한 내용 설명으로 가장 부적절한 것은?",c:["아키텍처 매트릭스를 통해 아키텍처 정보를 분류하는 차원은 기업의 특성에 맞게 임의로 조정할 수 있다.","아키텍처 매트릭스는 EA 정보를 체계적으로 분류한 틀로써, 기업이 관리하려고 하는 EA 정보의 수준과 활용 계층의 분류를 통하여 결정될 수 있다.","아키텍처 매트릭스에서 뷰(View)는 비즈니스, 애플리케이션, 데이터, 기술 등으로 구성하고, 관점(Perspective)은 계획자, 책임자, 설계자, 개발자 등으로 반드시 구성되어야 한다.","아키텍처 도메인 구성은 기업이 아키텍처 매트릭스를 어떻게 정의하느냐에 따라 달라질 수 있다."],a:2,ex:"아키텍처 매트릭스는 기업 특성에 맞게 조정 가능. 반드시 고정된 구성일 필요 없음."},
{n:8,q:"참조모델에 대한 설명으로 틀린 것은?",c:["참조모델은 아키텍처 구성요소를 식별하여 표준화한 것으로, 기관이나 기업의 EA를 수립할 때 참조하는 추상화된 모델이다.","국내의 대표적인 참조모델은 범정부차원의 참조모델이 있으며, 그 내용은 업무, 서비스, 기술, 데이터, 성과 참조모델 등으로 구성된다.","참조모델 중에서 데이터의 표준구조와 교환방식을 제시하는 데이터 참조모델의 활용도가 가장 높다.","참조모델을 정의하는 방법은 산업군별로 특성을 추출하여 추상화시키는 방법과 산업내 대표적인 기업의 참조모델을 표본으로 정의하는 방법이 있다."],a:2,ex:"DRM 활용도가 가장 높다는 것은 근거 없음. TRM이 먼저 적용되는 영역."},
{n:9,q:"EA 프로젝트에서 DA 수립 업무에 대한 설명으로 가장 부적절한 것은?",c:["전사 데이터 영역 모델은 '개괄 데이터 모델'이라고도 하며 상위 수준에서 전사 데이터 영역을 분류하여 표현한 것이다.","'개념 데이터 모델'은 전사 수준의 데이터 모델로써 중요 일반 속성까지 도출하여 표현한 데이터 모델이다.","'논리 데이터 모델'은 업무 요건을 충족시키기 위해 데이터의 상세 구조를 논리적으로 구체화한 것이다.","'물리 데이터 모델링'은 기술적 환경 및 특성을 고려하여 물리적 데이터 구조를 설계하고 데이터베이스 객체를 정의하는 것이다."],a:1,ex:"'중요 일반 속성까지 도출하여 표현' = 틀린 선지. 개념 데이터 모델은 핵심 엔터티+관계 중심, 상세 속성 미포함."},
{n:10,q:"일반적으로 적용되고 있는 아키텍처 도메인에 대한 설명으로 가장 부적합한 것은?",c:["비즈니스 아키텍처(BA)는 기업의 경영목표 달성을 위해 업무구조를 정의한 아키텍처 영역이다.","애플리케이션 아키텍처(AA)는 기업의 업무를 지원하는 전체 애플리케이션을 식별하고 애플리케이션 구조를 체계화하는 것이다.","데이터아키텍처(DA)는 기업의 업무 수행에 필요한 전체 데이터의 구조를 체계적으로 정의하는 것이다.","기술 아키텍처(TA)는 비즈니스 아키텍처, 데이터아키텍처, 애플리케이션 아키텍처 등의 상호관계를 전체적으로 표현하는 것이다."],a:3,ex:"TA는 기술 인프라 표준화가 목적. 아키텍처 간 상호관계를 표현하는 것은 EA 전체의 역할."},
{n:11,q:"기술 참조모델(TRM)에 대한 설명으로 틀린 것을 모두 고르시오. [복수 정답: ①③]",c:["①기술 참조모델은 다른 참조모델에 비하여 구축하기 어렵고 기대효과가 적어 가장 나중에 활용하는 영역이다.","②기술 참조모델은 몇 개의 서비스 영역으로 구성되고 서비스 영역은 다시 하위 수준의 서비스 범주로 구성될 수 있다.","③기술 참조모델을 개별 기업에서 적용하는 것은 일반적이지 않으며 큰 의미가 없다.","④기술 참조모델을 적용하면 시스템 간의 상호운용성을 향상시킬 수 있다."],a:0,ex:"①③이 틀림. TRM은 구축 용이하고 기대효과가 커서 먼저 적용하며, 개별 기업에서도 일반적으로 적용함."},
{n:12,q:"EA 프로세스에 대한 설명으로 틀린 것은?",c:["EA 프로세스는 EA를 구축하고 관리하는 절차로서 IT 관리체계 전반에 걸친 모든 프로세스를 포함한다.","EA 프로세스에는 일반화되어 있는 방법론을 적용하기보다 전사의 특성에 맞게 조정하여 적용하는 것이 바람직하다.","EA 프로세스는 EA 프레임워크의 구성요소 중의 하나이며, 다른 구성요소를 정의하기 위한 절차를 포함한다.","EA 프로세스는 EA에 대한 비전 수립, 구축, 관리, 활용 등의 단계를 포함한다."],a:0,ex:"EA 프로세스는 EA 구축·관리 절차. IT 관리체계 전반의 모든 프로세스를 포함하는 것이 아님."},
{n:13,q:"참조모델의 활용 목적과 효과에 대한 설명으로 틀린 것을 모두 고르시오. [정답: ④]",c:["참조모델은 다양한 용도로 활용될 수 있으며 용도에 따라 효과도 달라질 수 있다.","업무 참조모델을 활용하면 개선의 대상이 되는 업무를 보다 쉽게 파악할 수 있다.","서비스 참조모델을 적용하면 시스템 변화에 대한 대응 속도를 개선할 수 있다.","업무 참조모델을 활용하면 표준화에 따른 벤더 독립성을 제고할 수 있다."],a:3,ex:"업무 참조모델은 벤더 독립성 제고와 무관. 벤더 독립성은 TRM(기술 참조모델)의 효과."},
{n:14,q:"데이터 참조모델의 활용 방안이나 효과에 대한 내용으로 가장 거리가 먼 것은?",c:["개선의 대상이 되는 관련 데이터를 데이터 참조모델을 참조하여 파악할 수 있다.","개별 기관의 DA를 데이터 참조모델을 참조하여 정의할 수 있다.","데이터의 재사용을 증대시키고 기업에 적합한 DBMS를 선택하는데 기준을 제공한다.","데이터 참조모델을 사용하는 기관간 정보의 상호운용성과 교환을 촉진할 수 있다."],a:2,ex:"DRM은 DBMS 선택 기준 제공과 무관. DRM은 데이터 표준구조·교환방식을 제시."},
{n:15,q:"EA 프로세스에 대한 설명으로 가장 부적절한 것은?",c:["EA 프로세스는 EA를 구축하고 관리하는 전체 절차에 관한 것으로 작업의 단계, 공정, 내용 등을 정의하는 것이다.","EA 프로세스는 일반화된 방법론이 있어 EA를 도입하고자 하는 기업은 일반화된 방법론을 그대로 따라야 한다.","EA 프로세스는 EA 비전 수립, EA 구축, EA 관리, EA 활용 등의 단계로 구분할 수 있다.","EA 구축 시에는 단계별로 보고회 및 워크샵 형태의 행사를 통해 이해관계자의 지속적인 참여를 유도해야 한다."],a:1,ex:"EA 프로세스는 일반화된 방법론을 그대로 따르지 않고 기업 특성에 맞게 조정하여 적용하는 것이 바람직."},
{n:16,q:"기술 참조모델에 대한 설명으로 틀린 것을 모두 고르시오. [정답: ②]",c:["①기술 참조모델은 상대적으로 구축하기 용이하고 기대효과가 커서 가장 먼저 적용하는 영역이다.","②개별 기업에서 기술 참조모델을 적용하는 것은 일반적이지 않으며, 범정부 차원이나 대규모 기업에서만 필요하다.","③기술 참조모델은 시스템간의 상호운용성 증대를 위해서 기술표준을 강조하는 구조를 가지고 있다.","④기술 참조모델은 시스템 구축 할 때 사용할 기술들에 대한 표준 프로파일을 분류하는 기준으로 활용된다."],a:1,ex:"②만 틀림. TRM은 개별 기업에서 적용하는 것이 일반적임. ①은 올바른 내용."},
{n:17,q:"EA 구축 방향 수립의 작업과 가장 거리가 먼 것은?",c:["이행 계획 수립","EA 목적 및 범위 정의","EA 비전 수립","EA 프레임워크 정의"],a:0,ex:"이행 계획 수립은 EA 구축 방향 수립 단계가 아닌 이후 단계의 작업."},
{n:18,q:"[업무전문가 관점에서 상세한 명세서를 작성, 논리적 정보모델·컴포넌트·응용디자인에 근거하여 정의] 해당하는 관점으로 적합한 것은?",c:["계획자 관점","책임자 관점","설계자 관점","개발자 관점"],a:2,ex:"설계자 관점: 상세한 명세서 작성, 논리적 정보모델 기반으로 정의."},
{n:19,q:"전사아키텍처 정보 구성에 대한 설명으로 부적절한 것을 모두 고르시오. [복수 정답: ②④]",c:["①EA 정보는 변화하지 않는 구성요소를 분석하여 정의하는 것이 이상적이다.","②EA 산출물과 EA 정보 구성요소는 같은 구조이다.","③EA 정보 구성은 아키텍처 매트릭스를 통하여 정의되고 표현된다.","④EA 정보는 상세하게 관리할수록 투자효과가 크다."],a:0,ex:"②④가 틀림. 산출물≠정보구성요소, 상세할수록 효과 크지 않을 수 있음."},
{n:20,q:"참조모델의 활용 목적과 효과에 대한 설명으로 부적절한 것은?",c:["업무 참조모델을 활용하면 개선의 대상이 되는 업무를 보다 쉽게 파악할 수 있고, 관련 기관간의 업무흐름을 촉진할 수 있다.","데이터 참조모델을 활용하면 정보의 상호교환을 촉진하고, 데이터의 중복을 배제하며 재사용을 촉진할 수 있다.","서비스 참조모델을 활용하면 신뢰성이 높은 시스템을 구축할 수 있고, 시스템 개발의 생산성과 품질 향상을 기대할 수 있다.","기술 참조모델을 활용하면 시스템간의 상호운용성은 향상하나 표준화를 통한 벤더 독립성은 적어진다."],a:3,ex:"TRM 활용 시 표준화를 통해 벤더 독립성 증대. '적어진다'는 틀린 설명."},
{n:21,q:"아키텍처 매트릭스 정의 시에 고려할 사항으로 부적합한 것을 모두 고르시오. [정답: ②]",c:["①조직 내 다양한 계층의 사람들이 매트릭스에 포함된 산출물이 범위와 목적에 적합하게 정의되었음을 확인할 수 있어야 한다.","②아키텍처 도메인은 비즈니스, 데이터, 애플리케이션, 기술로 반드시 구성되어야 한다.","③아키텍처 매트릭스는 IT 조직의 성숙도를 고려해서 정의한다.","④EA 정보를 공유정보로 구축하기 위해서는 EA 정보 구성 요소를 추가로 정의해야 한다."],a:1,ex:"②만 틀림. 아키텍처 도메인은 반드시 4개로 구성될 필요 없음. 기업 특성에 맞게 조정 가능."},
{n:22,q:"목표 아키텍처를 정의하는 방식으로 가장 올바른 것은?",c:["목표 아키텍처 정의 작업을 수행할 경우, 모든 관점의 산출물을 동시에 정의하는 것이 일반적이다.","목표 아키텍처 정보 구축 시 먼저 비즈니스 아키텍처(BA)를 정의하고 타 아키텍처를 정의하는 것이 바람직하다.","목표 아키텍처 정의 작업은 전사 외부의 Best Practice를 반영하는 것이므로 반드시 참조 모델이 존재해야 한다.","목표 기술아키텍처 정보 구축은 목표 BA를 잘 지원할 수 있는 기술 아키텍처를 정의해야 한다."],a:1,ex:"목표 아키텍처는 BA 먼저 정의 → DA·AA·TA 순으로 정의하는 것이 바람직."},
{n:23,q:"전사아키텍처(EA) 정보 구축 방식에 대한 설명으로 가장 부적절한 것은?",c:["EA 정보를 구축 방법은 상향식과 하향식이 있다.","상향식 방식은 조직의 모든 업무가 포함되는 것을 보장할 수 있는 장점이 있는 반면 상위 업무 기능 분류의 수준이 서로 다르게 나타날 수 있는 단점이 있다.","하향식 방식은 관점이 명확한 장점이 있는 반면 일부 구성요소가 누락될 수 있는 단점이 있다.","EA 정보 구축은 존재하는 산출물만을 기준으로 작성한다."],a:3,ex:"EA 정보는 존재하는 산출물만이 아니라 필요한 정보까지 포함하여 구축."},
{n:24,q:"아키텍처 매트릭스를 정의할 때 고려할 사항으로 부적절한 것은?",c:["조직안에 포함된 다양한 계층의 사람들이 아키텍처 매트릭스에 포함되는 산출물의 범위와 목적이 적합하게 정의되었음을 확인할 수 있어야 한다.","아키텍처 매트릭스는 기업의 조직문화, 의사결정 등에 따라 산출물이 달라지므로 기업의 조직문화와 의사결정구조를 고려해서 정의해야 한다.","아키텍처 매트릭스는 실제 시스템과 아키텍처 개발표준에 대한 준수성을 높이고 조직별로 통일된 접근이 가능하도록 정의해야 한다.","모든 아키텍처 정보간의 상호연관성을 정의하는 것은 비효율적이므로 데이터와 애플리케이션간의 상호연관성을 중심으로 정의해야 한다."],a:3,ex:"모든 아키텍처 정보 간 상호연관성 정의가 필요. 데이터-앱 간만으로 제한하는 것은 부적합."},
{n:25,q:"현행 아키텍처 정보 구축에 대한 설명으로 가장 부적절한 것은?",c:["현행 아키텍처는 현재의 업무나 정보시스템에 대하여 기존의 자료를 분석하여 EA 정보를 구축한다.","현행 아키텍처는 상위 수준의 업무기능과 시스템에 대한 분류체계를 정의한 후 나머지 하위의 정보 구축은 병렬적으로 수행할 수 있다.","현행 아키텍처는 아키텍처 매트릭스와 무관하게 EA 정보를 구축해도 된다.","현행 아키텍처는 조직의 EA 도입 목적을 고려해서 정의될 정보수준을 결정한다."],a:2,ex:"현행 아키텍처도 아키텍처 매트릭스를 따라야 함. 무관하게 구축하는 것은 잘못됨."},
{n:26,q:"현행 아키텍처의 정보구축에 대한 설명으로 가장 부적절한 것은?",c:["현행 아키텍처는 현재의 업무나 정보시스템의 기존 자료를 분석하여 EA 정보를 구축한다. 따라서, 현행 아키텍처 정보는 아키텍처 매트릭스를 그대로 따를 수 없다.","현행 아키텍처 구축은 상위 수준의 업무기능과 시스템에 대한 분류를 우선적으로 수행하고, 그 기준에 따라 나머지 정보를 구축하는 것이 효율적이다.","현행 애플리케이션 아키텍처의 정보구축은 업무기능 분류를 기반으로 전사 애플리케이션을 분류하고 이들 간의 연관관계를 분석하는 것에서부터 시작된다.","현행 데이터아키텍처의 정보구축 방법 중에서 하향식 방법은 기업의 업무 수행을 위해 필요한 데이터 요건을 식별하여 데이터 모델로 표현한다."],a:0,ex:"현행 아키텍처도 아키텍처 매트릭스를 따를 수 있고 따라야 함. '따를 수 없다'는 틀린 설명."},
{n:27,q:"목표 아키텍처 정보 구축에 대한 설명으로 가장 부적절한 것은?",c:["목표 아키텍처는 현행 아키텍처에 대한 문제점과 개선사항을 도출하고 이를 목표 아키텍처에 반영하는 방식으로 진행한다.","목표 아키텍처는 비즈니스 아키텍처를 먼저 정의하고 이를 효율적으로 지원하는 데이터, 애플리케이션, 기술 아키텍처를 정의하는 것이 바람직하다.","조직의 EA 도입 목적을 고려해서 정의될 목표 아키텍처 정보수준을 결정해야 하는데 목표 아키텍처 EA 구축 초기에는 아키텍처 매트릭스의 개념적 수준까지 정의하는 것이 일반적이다.","비용 대비 효과를 고려하고 비즈니스와 기술환경 변화에 대한 유연성을 확보하기 위해서 목표 아키텍처를 EA 도입 초기부터 상세 수준까지 정의하는 것이 바람직하다."],a:3,ex:"EA 도입 초기부터 상세 수준까지 정의하는 것은 비효율적. 개념 수준부터 시작하는 것이 일반적."},
{n:28,q:"EA 관리시스템에 대한 설명으로 틀린 것은?",c:["EA 관리시스템은 업무·데이터·애플리케이션·기술 아키텍처 정보 등을 도식화하여 표현할 수 있는 모델링 도구를 말한다.","EA 관리시스템을 활용하면 아키텍처 정보를 공유할 수 있어서 각 EA 아키텍처 요소를 이해관계자들이 정확하게 파악할 수 있다.","EA 관리시스템은 현업과 IT가 공유할 수 있는 모델을 제공함으로써 현업과 IT의 의사소통 시에 오류를 줄일 수 있다.","EA 관리시스템을 활용하면 현행 아키텍처와 목표 아키텍처간의 차이분석을 손쉽게 할 수 있다."],a:0,ex:"EA 관리시스템 = 모델링 도구+EA 리파지토리+EA 포탈의 통합 시스템. 모델링 도구만을 말하는 것이 아님."},
{n:29,q:"EA의 관리체계를 정착시키기 위해서 고려되어야 할 사항으로 부적합한 것을 고르시오. ",c:["①정의된 EA 조직체계, 프로세스체계 등을 문서화하여 전 조직이 준수할 수 있도록 제도화 한다.","②EA 관련 제반 이해당사자들의 EA 인지도 향상 및 업무수행 시에 EA 정보 활용도 증진을 위해서 적절한 교육 프로그램을 제공한다.","③EA 관리체계를 주기적으로 점검하고 개선점을 도출하여 반영할 수 있는 제도적 장치를 마련한다.","④EA 도입에 따른 변화관리는 EA 도입 후에 시간이 어느 정도 경과한 뒤에 시작하는 것이 바람직하다."],a:3,ex:"④만 틀림. 변화관리는 EA 도입 초기부터 함께 진행해야 함."},
{n:30,q:"효과적인 EA 관리체계를 구축하기 위해 고려되어야 할 사항으로 부적절한 것은?",c:["정의된 EA 조직체계, 프로세스체계 등을 문서화하여 전 조직이 준수할 수 있도록 제도화한다.","EA 관련 제반 이해당사자들에게 지속적으로 선진 참조모델을 교육하는 것이 가장 중요하다.","EA 관리체계를 주기적으로 점검하고 개선점을 도출하여 반영할 수 있는 제도적 장치를 마련한다.","EA 관리시스템의 활용도와 만족도를 주기적으로 점검하여 시스템 품질을 지속적으로 개선해 나간다."],a:1,ex:"선진 참조모델 교육이 가장 중요한 것이 아님. 제도화·주기적 점검·활용이 핵심."},
{n:31,q:"EA 관리 조직의 정의에 대한 설명으로 가장 부적절한 것은?",c:["EA 관리조직을 별도 조직으로 구성할 수 없는 중소 규모의 IT 조직일지라도 EA 관리 전담 조직을 반드시 신설해야 한다.","EA 정보를 관리하기 전문조직은 조직의 규모가 있을 경우 아키텍처 영역별로 정의하는 것이 바람직하다.","EA 구축의 목적이 신시스템 구축을 위한 계획 수립이라면 PMO와 EA 관리 전담 조직을 동시에 정의하는 것이 바람직하다.","EA 관리조직은 계획자 수준에서 실무자 수준까지 다양한 시각에서 책임과 역할이 명확히 정의되어야 한다."],a:0,ex:"중소 규모 조직도 반드시 전담조직을 신설할 필요는 없음. 규모에 맞게 유연하게 구성 가능."},
{n:32,q:"EA 관리체계의 EA 관리조직에 대한 설명으로 가장 부적절한 것은?",c:["구축된 EA 정보를 담당하는 전담 조직이 없다면 EA 정보는 하나의 문서에 불과함으로 적절한 조직을 구성하는 것이 중요하다.","현업과 IT 조직 간의 의사소통에 문제가 있을 경우에는 현업의 요건을 종합적으로 관리하는 조직을 추가로 정의할 필요가 있다.","EA 관리조직 체계는 EA 관리를 위해서 필요한 직무와 직무 간의 관계, 업무분장 등을 정립하는 것으로 정보관리의 전체 조직과는 상관이 없다.","EA 관리체계 정착을 위해서는 현업부서에서도 EA를 이해하고, EA 정보를 활용하며, IT 혁신에 대한 적극적인 의견을 제시할 필요가 있다."],a:2,ex:"EA 관리조직은 정보관리 전체 조직과 연관이 있음. '상관이 없다'는 틀린 설명."},
{n:33,q:"EA 관리시스템의 핵심 구성요소로 가장 거리가 먼 것은?",c:["EA 정보를 생산하는 모델링 도구","EA 프로젝트 관리도구","EA 정보를 저장 관리하는 EA 리파지토리(Repository)","EA 정보를 활용하는 EA 포탈"],a:1,ex:"EA 프로젝트 관리도구는 EA 관리시스템의 핵심 구성요소가 아님. 핵심 = 모델링도구+리파지토리+포탈."},
{n:34,q:"EA 정보의 활용 사례로써 IT 기획관리 업무에 대한 설명으로 가장 부적절한 것은?",c:["기존시스템 개선 및 신규시스템 개발을 위해 기준 및 참조정보를 제공한다.","중복을 배제한 효과적인 시스템 투자계획 수립에 활용한다.","도입되는 시스템이 전사(Enterprise) 표준을 준수하는지 통제함으로써 상호운용성, 유지보수 편리성 등을 확보한다.","시스템 변경 시에 영향도를 파악하여 위험을 최소화한다."],a:1,ex:"② 시스템 투자계획 수립 X"},
{n:35,q:"EA 정보가 효과적으로 활용되기 위해서 고려되어야 할 사항으로 부적절한 것은?",c:["EA 관리시스템을 자체로 구축해야 한다.","EA 정보의 품질이 보장되어야 한다.","EA 정보를 관리하고 통제할 수 있는 전담 조직이 구성되고 운영되어야 한다.","EA 정보를 전사적으로 공유하고 활용할 수 있는 절차와 시스템이 필요하다."],a:0,ex:"EA 관리시스템은 자체 구축이 필수가 아님. 패키지 도입도 가능."},
{n:36,q:"EA 정보가 보다 효과적으로 활용되기 위한 필요 사항으로 가장 거리가 먼 것은?",c:["EA 정보 자체의 품질이 보장되어야 하고 현행 및 목표시스템의 아키텍처 정보를 항상 최신의 상태로 유지한다.","EA 정보를 관리하고 적용을 통제할 수 있는 전담 조직이 구성·운영 되어야 한다.","EA 정보를 전사적으로 공유하고 활용할 수 있는 절차와 시스템이 필요하다.","EA 정보 관리시스템은 패키지를 도입하여 구축된다."],a:3,ex:"EA 관리시스템이 반드시 패키지로 구축되어야 하는 것은 아님. 자체 구축도 가능."},
{n:37,q:"K대리가 DA 담당자로써 회사에서 수행해야 하는 역할과 가장 거리가 먼 것은?",c:["DA 담당자로써 DA를 정의하는데 있어 회사에서 정의한 EA 정보와 항상 연계하여 생각한다.","데이터 관리 영역을 DA 원칙, DA 정보, DA 관리 등으로 구분한다면 DA 담당자는 'DA 정보'에 대한 업무만을 수행하면 된다.","EA에서 정의된 원칙과 정보를 이해하고 준수해야 하며 데이터아키텍처 영역에서 구체화할 수 있는 것은 더 상세화시킨다.","데이터 부문에서 발생하는 변경사항이 EA 정보에 적절히 반영될 수 있게 한다."],a:1,ex:"DA 담당자는 'DA 정보'만이 아니라 DA 원칙·정보·관리 전체 영역을 수행해야 함."},
{n:38,q:"EA 정보의 핵심적 활용과 가장 거리가 먼 것은?",c:["기업 전략 수립: 경영환경 분석 내용을 바탕으로 기업의 마케팅 전략과 상품 전략을 수립할 수 있다.","정보화 계획 수립: 정보화 전략 계획 수립 시에 활용할 수 있으며, 중복을 배제한 효과적인 시스템 투자 계획 수립에 활용한다.","시스템 개발: 기존시스템 개선과 신규시스템 개발을 위한 기준 및 참조 정보를 제공한다.","IT 통제: 도입되는 시스템의 전사 표준에 대한 준수 여부를 통제함으로써 상호운용성, 유지보수 편리성 등을 확보할 수 있다."],a:0,ex:"기업 마케팅·상품 전략 수립은 EA 정보의 핵심 활용과 거리가 멈. EA는 IT 업무(정보화계획·시스템개발·IT통제)에 활용."},
{n:39,q:"EA에 관련하여 DA가 이루어야 할 3가지의 통합성과 거리가 먼 것은?",c:["EA 범위 전체에 대한 각 모델 내의 불일치성을 제거한다.","관련된 타 도메인(업무, 데이터, 애플리케이션, 기술 등)과의 불일치성을 제거한다.","현행 아키텍처와 목표 아키텍처의 불일치성을 제거한다.","관련된 관점(계획자, 책임자, 설계자, 개발자 등)간의 불일치성을 제거한다."],a:2,ex:"3가지 통합성 = 모델 내 + 도메인 간 + 관점 간. 현행↔목표 불일치 제거는 포함되지 않음."},
{n:40,q:"아키텍처 매트릭스의 시점과 데이터아키텍처(Data Architecture) 산출물의 연결이 가장 부적절한 것은?",c:["계획자 : 데이터 표준","책임자 : 개념 데이터 모델","설계자 : 논리 데이터 모델","개발자 : 데이터베이스 객체"],a:0,ex:"계획자=데이터원칙, 책임자=개념 데이터 모델, 설계자=논리 데이터 모델, 개발자=물리데이터모델,DB객체. 1번 틀림."},
],
2:[
{n:41,q:"현장 불편사항과 신규 개발사항들을 프로젝트 팀에게 전달해야 하는 문서로 가장 적합한 것은?",c:["정보 분석서","정보 요구 사항","정보 목록","정보 항목 분류표"],a:1,ex:"정보 요구사항 = 현장 불편사항·신규 개발사항을 프로젝트팀에 전달하는 문서."},
{n:42,q:"정보 요구 사항 유형별 관리기준으로 부적절한 것은?",c:["외부 인터페이스: 기존과 동일한 형태의 인터페이스 존재 여부","보안 개선: 측정이 불가능한 형태 판단 여부","기능 개선: 많은 사용자가 편리하게 사용할 수 있는 요건의 우선 적용 여부","성능 개선: 현행 기술 수준과 서비스 특성을 고려한 구현 가능 여부"],a:1,ex:"보안 개선 요건의 관리기준 = 측정이 불가능한 형태 판단 여부. 이 설명이 부적절."},
{n:43,q:"정보 요구사항의 소스 문서로 가장 부적합한 것은?",c:["현행 시스템 분석서","현행 사용자 요구 사항 정리문서","현행 업무처리 매뉴얼","현행 시스템 개선과제 및 문제점 정리문서"],a:2,ex:"현행 업무처리 매뉴얼은 소스 문서 중 상대적으로 부적합. 나머지 3개가 핵심 소스 문서."},
{n:44,q:"정보 요구 사항 관리 프로세스 순서로 바르게 나열한 것은? [가.검토 나.영향도분석 다.반영계획수립 라.발송 마.수렴 바.공식화]",c:["라 - 마 - 가 - 나 - 다 - 바","라 - 마 - 가 - 나 - 바 - 다","가 - 마 - 라 - 나 - 바 - 다","가 - 마 - 라 - 나 - 다 - 바"],a:0,ex:"발송(라)→수렴(마)→검토(가)→영향도분석(나)→반영계획수립(다)→공식화(바). '라마가나다바'로 암기."},
{n:45,q:"요구 사항을 명확하게 정의하고 개발하기 위해서 필수적으로 진행할 단계가 아닌 것은?",c:["정보 요구 사항 상세화","정보 요구 사항 분석 및 정의","정보 요구 사항 검토 및 리뷰","정보 요구 사항 표준화"],a:3,ex:"표준화는 요구사항을 명확하게 정의하는 필수 단계가 아님."},
{n:46,q:"매일아침 B/S(재무제표) 실적 조회 시 처리시간이 과다하게 소요되는 불편사항의 요건 분류 유형으로 적합한 것은?",c:["보안 개선 요건","성능 개선 요건","기능 개선 요건","외부 인터페이스 개선 요건"],a:1,ex:"B/S 처리시간 과다 소요 = 성능 개선 요건."},
{n:47,q:"프로젝트 관리자가 선택할 수 있는 질문법(Questioning)의 종류로 거리가 먼 것은?",c:["타이-다운(Tie-down) 질문법","대안전보(Alternate Advance) 질문법","포커핀 또는 부메랑(Porcupine or Boomerang) 질문법","노미날 그룹(Nominal Group Technique) 질문법"],a:3,ex:"노미날 그룹(NGT)은 집단 의사결정 기법이지 질문법이 아님."},
{n:48,q:"워크숍 수행의 목적으로 부적당한 것은?",c:["정보시스템에 대한 관리 수준, 문제점, 현안 등을 파악한다.","경영층 또는 현업 부서장의 공통된 의견을 도출한다.","유사업무 또는 관련업무를 수행하는 부서에 대한 면담비용을 절감한다.","전문가들의 판단력을 이용하여 최적의 결론을 도출한다."],a:0,ex:"'전담부서면담에 해당하는것임 1번은"},
{n:49,q:"화면 수정·보완 요청에 대해 전체적으로 영향도 분석 및 조사를 실시하기에 가장 적합한 사람은?",c:["요구 사항을 요청한 사람","전사 관점의 데이터아키텍처 담당자","요구 사항을 개발하는 담당자","담당 부서의 관리자"],a:1,ex:"전체 영향도 분석 = 전사 관점의 데이터아키텍처 담당자가 가장 적합."},
{n:50,q:"구매시스템을 신규로 구축하기 위하여 수집하고 있는 문서로 가장 비효율적인 것은?",c:["현행 시스템 데이터 모델(ERD)","현행 시스템 문제점 및 개선사항","현행 시스템 전산출력 의뢰서","신규 시스템에 대한 구매부서 요구 사항 정의서"],a:2,ex:"현행 시스템 전산출력 의뢰서 = 신규 구축 시 가장 비효율적인 수집 문서."},
{n:51,q:"데이터아키텍처 담당자 Y가 수행할 역할로 부적합한 것은?",c:["변경 및 신규개발 요건에 대한 검토","요청 사항 내용 중 미결 사항에 대한 검토","개발요건에 대한 테스트 및 검증","데이터에 대한 표준제시 및 검토"],a:2,ex:"개발요건 테스트·검증은 DBA 역할. DA 담당자 역할이 아님."},
{n:52,q:"면담 대상자와 면담 진행팀의 역할에 대한 설명으로 틀린 것은?",c:["면담대상자: 업무에 대해서 면담자에게 명확하고 이해하기 쉽게 설명해 주어야 한다.","기록자: 면담 종료 시에 기록 내용 중에 주요 사항을 확인한다.","면담자: 면담의 취지를 설명하고 면담 주제의 범위에서 이탈 시에는 주의를 환기시킨다.","관찰자: 수행 의도대로 면담진행 여부 및 최종적 면담종료에 대해 판단한다."],a:2,ex:"관찰자 역할이다."},
{n:53,q:"이해당사자의 득실 차이가 많아 결론을 내리지 못할 때 효율적으로 결론을 도출할 수 있는 기법으로 적합한 것은?",c:["워크샵 기법","사용자 면담 기법","브레인 스토밍 기법","업무 매뉴얼 조사 기법"],a:0,ex:"이해당사자 간 득실 차이로 결론 못 낼 때 = 워크숍 기법이 적합."},
{n:54,q:"면담팀 구성 단계에 있어서 반드시 고려해야 할 내용이 아닌 것은?",c:["면담팀은 가능하다면 2~3인으로 구성하도록 한다.","면담 팀원간 역할을 구분하도록 한다.","면담 기록자나 관찰자는 사전에 업무를 습득하도록 한다.","프로젝트 후원자의 추천을 받아 선별하도록 한다."],a:3,ex:"프로젝트 후원자의 추천으로 선별 = 필수 고려사항 아님."},
{n:55,q:"경영환경 분석 및 현황 조사를 위한 조사기법으로 부적합한 것은?",c:["경쟁환경 분석","SWOT 분석","RAEW 분석","Activity 분석"],a:2,ex:"RAEW 분석은 경영환경 분석 기법이 아님. 업무기능과 조직 간 책임 분석 기법."},
{n:56,q:"화폐가치 산출법에 대한 설명으로 틀린 것은?",c:["정보 요구 사항 간의 상호 관련성을 평가하여 1점부터 3점까지 점수를 부여한다.","시스템 차원의 중요성을 평가하여 1점부터 3점까지 점수를 부여한다.","기업 차원의 중요성을 평가하여 1점부터 3점까지 점수를 부여한다.","3가지 점수를 곱하여 총점 대비 각각의 정보 요구 사항 가치를 백분율(%)로 환산한다."],a:0,ex:"화폐가치 산출법: 상호관련성 점수는 1~5점 (1~3점이 아님). ①번이 틀린 선지."},
{n:57,q:"현업의 정보 요구 사항 파악을 위한 사용자 면담 대상자를 선발하는 방법으로 가장 적합한 것은?",c:["업무에 대해 명확하게 설명할 수 있는 사람으로 선발한다.","면담은 통상적으로 2인으로 구성하여 면담 기록에 누락이 없도록 한다.","현업의 관련분야에 정통한 전문가를 집중적으로 선발한다.","면담에 대한 부담을 줄이기 위하여 면담 진행자와 안면이 있는 사람으로 구성한다."],a:0,ex:"면담 대상자 = 업무에 대해 명확하게 설명할 수 있는 사람을 선발."},
{n:58,q:"CRM 시스템 구축을 위한 면담 수행 시 고려해야 할 사항으로 가장 부적합한 것은?",c:["면담 내용에 대하여 문서화 작업을 수행한다.","전문가 의견을 토대로 결과를 작성한다.","면담 대상자의 업무 범위를 준수한다.","면담시간을 준수한다."],a:1,ex:"'전문가 의견을 토대로 결과 작성' = 부적합. 면담은 면담 대상자의 의견을 기반으로 작성해야 함."},
{n:59,q:"'신규대출처리'에 대한 기능정의와 하부 프로세스를 분해하여 논리적으로 계층화하는 분석 기법으로 가장 부적합한 것은?",c:["가지사슬 분석","전문성에 의한 분석","생명주기에 의한 분석","본원적 분석"],a:3,ex:"본원적 분석은 마이클 포터의 전략 분석 도구. 프로세스 계층화 기법이 아님."},
{n:60,q:"면담팀 구성 단계에서 반드시 고려해야 할 내용이 아닌 것은?",c:["사용자 부서를 위한 면담팀은 가능하다면 2~3인으로 구성한다.","면담을 원활하게 하고 내용을 누락 없이 기술하기 위해서 팀원 간의 역할을 구분한다.","면담 기록자나 관찰자는 경영기획부서의 업무를 사전 습득해야 한다.","프로젝트 후원자나 관리자의 추천을 받아 선별하도록 한다."],a:3,ex:"프로젝트 후원자 추천으로 선별 = 필수 고려사항 아님 (54번과 동일)."},
{n:61,q:"시스템 차원의 중요성을 평가하여 점수를 부여하고, 각 점수의 합을 통해 정보가치의 퍼센트를 산정하는 방법은?",c:["화폐가치 산출방법","정보 요구 매트릭스 분석방법","CRUD 분석방법","상대적 중요도 산정방법"],a:3,ex:"합산을 통해 퍼센트 산정 = 상대적 중요도 산정방법. 화폐가치 산출법은 곱셈을 사용."},
{n:62,q:"목표를 지원하면 5점, 전략을 지원하면 3점 등으로 매트릭스와 가중 평균을 이용하여 중요도를 산출하는 방법은?",c:["상대적 중요도 산정 방법","요구 사항 가치평가 방법","화폐가치 산출 방법","우선순위 중요도 분류 방법"],a:0,ex:"매트릭스 + 가중 평균 + 목표 지원 점수 부여 = 상대적 중요도 산정 방법."},
{n:63,q:"현행시스템 관련 문서를 수집했는지 평가하기 위해 K대리가 검토하는 기준으로 부적합한 것은?",c:["유용성: 수집된 문서가 활용가능한지 검토한다.","완전성: 문서의 내용에 누락된 부분이 없는지 검토한다.","정확성: 문서의 내용이 현재 시스템과 일치하는지 검토한다.","확장성: 문서가 최신의 내용을 반영하고 있는지 검토한다."],a:3,ex:"확장성 = 문서 수집 평가 기준이 아님. 4대 기준 = 유용성·완전성·정확성·유효성."},
{n:64,q:"관련 시스템 문서들을 수집했는지 평가하기 위해 H대리가 검토해야 하는 기준이 아닌 것은?",c:["유용성","완전성","정확성","적시성"],a:3,ex:"적시성은 문서 수집 평가 기준이 아님. 4대 기준 = 유용성·완전성·정확성·유효성."},
{n:65,q:"프로세스 계층도의 모듈성이 확보되기 위한 분해 기준으로 적합한 것은?",c:["응집도가 높을수록, 결합도가 낮을수록","응집도가 낮을수록, 결합도가 높을수록","응집도가 높을수록, 결합도가 높을수록","응집도가 낮을수록, 결합도가 낮을수록"],a:0,ex:"모듈성 = 응집도(Cohesion) 높을수록, 결합도(Coupling) 낮을수록 좋음."},
{n:66,q:"프로세스 관점에서 정보 요구를 상세화하는 작업 내용으로 부적합한 것은?",c:["프로세스별로 정보 항목의 통합성 및 분리성 여부를 검토한다.","프로세스별로 정보 항목을 도출하고 표준화 한다.","프로세스별로 CRUD 분석을 실시한다.","프로세스 분해 및 상세화 작업을 수행한다."],a:0,ex:"정보 항목의 통합성·분리성 검토 = 프로세스 관점 상세화 작업이 아님."},
{n:67,q:"객체지향 관점에서 시스템과 사용자간의 관계흐름을 표현하여 요구 사항을 쉽게 파악할 수 있는 방법으로 적합한 것은?",c:["정보 요구 사항 맵","유즈케이스 다이어그램","클래스","액터"],a:1,ex:"유즈케이스 다이어그램 = 객체지향 관점에서 사용자와 시스템 간의 관계흐름을 표현."},
{n:68,q:"요구 사항 분석가가 상관분석을 수행할 경우에 나타나는 현상으로 옳은 것은?",c:["상관분석 수행에 있어 가장 중요한 요소인 객관성을 확보할 수 있다.","프로젝트 내부 인력의 적극적인 참여와 지원이 필요하다.","상관분석 수행에 필요한 업무 파악에 한계가 존재한다.","정보 요구 사항과 관련된 업무팀과 의사소통이 원활하므로 프로젝트를 인력 변동 없이 원활하게 수행할 수 있다."],a:3,ex:"나머지는 외부품질보증팀 감리에 의해 수행할경우 나타나는 장 단점."},
{n:69,q:"유즈케이스 다이어그램 분석기법의 필수적 구성요소로 거리가 먼 것은?",c:["액터(Actor)","유즈케이스(Usecase)","유즈케이스 관계","시스템경계"],a:3,ex:"시스템경계는 유즈케이스 다이어그램의 필수 구성요소가 아님. 필수 = 액터+유즈케이스+관계."},
{n:70,q:"사용자 요구 사항 반영 여부를 확인하는 재검토 기준에 포함되지 않는 것은?",c:["사용자의 정보 요구 사항의 누락 여부에 대한 검토 기준","사용자의 정보 요구 사항이 정확성 검토 기준","사용자의 정보 요구 사항에 따른 영향도 파악에 대한 검토 기준","사용자의 정보 요구 사항에 대한 주도성 검토 기준"],a:3,ex:"주도성 = 재검토 기준에 포함되지 않음. 기준 = 누락여부·정확성·영향도 파악."},
{n:71,q:"산출물별 체크리스트 기준에 일반적으로 포함되지 않는 것은?",c:["일관성","주관성","정확성","완전성"],a:1,ex:"주관성은 산출물 체크리스트 기준이 아님. 기준 = 일관성·정확성·완전성."},
{n:72,q:"상관분석 기법의 설명으로 틀린 것은?",c:["CRUD 매트릭스 분석 수행 시 복수의 액션이 발생하는 경우 C > D > U > R의 우선순위에 따라 기술한다.","모든 정보항목이 모든 기본 프로세스에서 사용되는지 혹은 기본 프로세스가 모든 정보항목을 사용하고 있는지를 확인한다.","업무기능/조직 대 정보항목의 상관분석에서 정보항목의 생성, 수정, 삭제 등을 'C(Create, Change)'로 표시한다.","업무기능/조직 대 정보항목의 상관분석에서 정보항목 값의 변경 없이 검색만 하는 경우에는 'R(Read)'로 표시한다."],a:3,ex:"업무기능/조직 상관분석에서 검색만 하는 경우 = U(Use). R(Read)가 아님. ④번이 틀린 선지."},
{n:73,q:"'정보 요구 사항 대 애플리케이션 상관분석' 기법으로 가장 적합한 것은?",c:["CRUD 매트릭스 분석기법","RAEW 매트릭스 분석기법","변환 매트릭스 분석기법","요구 사항 추적 매트릭스 분석기법"],a:0,ex:"정보 요구사항 대 애플리케이션 상관분석 = CRUD 매트릭스 분석기법."},
{n:74,q:"교육신청변경관리 프로세스가 등록된 수강신청내역을 검색 후 취소 처리할 때 (가) 셀의 내용으로 가장 적합한 것은?",c:["R(Read)","D(Delete)","U(Update)","C(Create)"],a:1,ex:"검색 후 취소(삭제) 처리 = D(Delete). CRUD 우선순위: C>D>U>R이므로 D가 맞음."},
{n:75,q:"CRUD 매트릭스 분석 시 복수의 액션이 발생할 경우 셀값 입력 우선순위로 가장 적합한 것은?",c:["C > D > R > U","C > R > U > D","C > D > U > R","C > U > R > D"],a:2,ex:"CRUD 우선순위: C(Create) > D(Delete) > U(Update) > R(Read)."},
{n:76,q:"정보항목/애플리케이션 상관분석 매트릭스의 점검 내용과 조치사항에 대한 설명으로 부적절한 것은?",c:["정보항목을 생성 및 삭제하는 기본 프로세스가 둘 이상 존재 → 기본 프로세스의 합성","정보항목을 생성하는 기본 프로세스가 없음 → 기본 프로세스 도출/정보항목 삭제/업무영역 이동","기본 프로세스가 사용(CRUD)하는 정보항목이 없음 → 정보항목 도출/기본 프로세스 삭제/업무영역 이동","정보항목이 7개 이상의 기본 프로세스에서 사용됨 → 기본 프로세스 삭제/업무영역으로 이동"],a:3,ex:"'7개 이상 사용 → 기본 프로세스 삭제'는 틀림. 올바른 조치는 정보항목 세분화."},
{n:77,q:"상관분석 결과 '교육입정'에 아무것도 없을 때 조치사항으로 가장 적절한 것은?",c:["'교육과정'을 생성하는 프로세스가 누락되었다.","'교육접수', '전화접수', 'Site접수' 등은 프로세스를 통합한다.","'고객문의내역'의 정보항목을 세분화 한다.","'교육입정'은 삭제하거나 사용 프로세스를 도출한다."],a:3,ex:"정보항목에 아무것도 없으면(C/R/U/D 모두 없음) 삭제하거나 사용 프로세스 도출."},
{n:78,q:"정보 요구사항 상관분석 매트릭스 분석 및 조치사항으로 가장 부적합한 것은?",c:["'공급자', '직원', '창고' 등의 정보항목을 생성하는 프로세스가 누락되었다.","'판매주문항목'은 생성 및 변경 프로세스만 존재하고 사용 프로세스를 도출한다.","'구매주문항목'은 기본 프로세스의 중복에 해당하므로 통합해야 한다.","'재고항목'을 생성하는 프로세스가 누락되었다."],a:2,ex:"'구매주문항목 기본 프로세스 중복 → 통합' = 올바른 조치사항이 아님. C가 중복인 경우 통합이 맞지만 문맥 확인 필요."},
{n:79,q:"'문의접수사항', '문의접수진행', '문의해결'에서 R만 존재할 때 조치사항으로 가장 적절한 것은?",c:["참조하는 신규 프로세스의 도출이 필요하다.","3개의 정보항목을 통합한다.","기본프로세스가 분석대상 업무영역에 속하지 않는다.","정보항목이 지나치게 크므로 정보항목의 세분화가 필요하다."],a:0,ex:"R만 존재(C 없음) = 생성 프로세스가 없음 → 참조하는 신규 프로세스 도출 필요."},
{n:80,q:"'창고', '공급자', '직원' 정보항목에서 문제가 발견되었을 때 조치사항으로 부적합한 것은?",c:["생성하는 기본프로세스의 도출이 필요하다.","불필요한 정보에 해당할 수 있으므로 정보항목 삭제 여부를 검토한다.","분석 대상의 업무영역 범위 외에 해당하므로 해당 업무영역으로 이동한다.","기본 프로세스의 통합 여부를 고려한다."],a:3,ex:"'기본 프로세스 통합'은 C가 중복으로 존재할 때의 조치. C가 없을 때의 조치가 아님."},
],
3:[
{n:81,q:"데이터 표준화의 일반적인 정의로 가장 적합한 것은?",c:["데이터 코드값에 대한 불일치를 파악하고 정의한다.","데이터 명칭에 대한 현행수준을 진단한다.","데이터 표준요소에 대한 명칭, 정의, 형식 등을 수립하고 적용하는 것을 말한다.","데이터 표준에 대한 영향도 분석을 수립한다."],a:2,ex:"데이터 표준화 = 데이터 표준요소에 대한 명칭·정의·형식 등을 수립하고 전사적으로 적용하는 것."},
{n:82,q:"데이터 표준화 수립의 기대효과로 가장 부적합한 것은?",c:["표준화된 명칭을 사용하여 다양한 계층 간의 명확한 의사소통이 가능해진다.","각 업무 시스템 간의 데이터 인터페이스 시에 데이터 변환 및 정제 비용이 감소한다.","일관성 있는 명칭을 사용하여 시스템 운용 시간 및 개발 생산성이 감소한다.","데이터 사용자들이 필요한 데이터의 소재 파악에 소요되는 시간 및 노력이 감소한다."],a:2,ex:"'개발 생산성이 감소한다' → 틀림. 표준화하면 생산성이 향상됨."},
{n:83,q:"데이터 명칭에 대한 표준화 원칙을 수립하고자 할 때, 고려할 사항으로 가장 부적절한 것은?",c:["데이터 명칭은 해당 개념을 유일하게 구분 해주는 이름이어야 한다.","데이터 명칭은 업무적 명칭과 기술적 명칭을 구별하여 활용해야 한다.","데이터 명칭은 업무적 관점에서 보편적으로 인지되는 이름이어야 한다.","데이터 명칭은 그 이름만으로도 데이터의 의미 및 범위가 파악될 수 있어야 한다."],a:1,ex:"데이터 명칭 원칙 = 유일성·업무적 보편성·의미전달 충분성. ②'업무적·기술적 명칭 구별'은 공식 3가지 원칙에 없음."},
{n:84,q:"데이터 표준 관리시스템을 도입할 때 고려사항으로 부적절한 것은?",c:["편의성: 사용자 관점에서 화면 구성 및 수작업 최소화 기능 제공 여부","확장성: 다양한 DBMS의 정보 수집 및 각종 데이터 관리 도구와 연동 지원 여부","유연성: 단계적 적용을 위한 복수 표준 관리 기능 존재 여부","특수성: 특정 업무 및 상황에 맞는 요건 중심의 시스템 기능 존재 여부"],a:3,ex:"'특수성'은 표준 관리시스템 도입 고려사항으로 부적절. 핵심 = 편의성·확장성·유연성."},
{n:85,q:"전사적 관점에서 데이터 표준화 기본 원칙으로 채택하기에 가장 부적절한 것은?",c:["한글명에 대해서는 복수개의 영문명을 허용한다.","영문명(물리명) 전환 시 발음식(예: 반지→BUNJD)도 허용한다.","한글명 및 영문명 부여 시 띄어쓰기는 허용하지 않는다.","영문명에 대해서는 복수개의 한글명을 허용한다."],a:0,ex:"'한글명에 복수 영문명 허용' → 불허. 한글명:영문명 = 1:1 원칙. 영문명→복수 한글명은 허용."},
{n:86,q:"전사차원의 데이터 표준을 정의할 때 데이터 형식의 데이터타입으로 부적절한 것은?",c:["Char","Date","Numeric","Long Raw"],a:3,ex:"Long Raw = Oracle 전용 특수 타입. 전사 표준 데이터타입으로 부적절."},
{n:87,q:"화면으로부터 어떠한 값의 입력도 없는 경우 '아니오'라고 미리 정의된 값이 입력될 수 있도록 하기 위해 사용하는 것은?",c:["허용 범위","허용 값","기본 값","코드 값"],a:2,ex:"입력이 없을 때 자동으로 입력되는 미리 정의된 값 = 기본값(Default)."},
{n:88,q:"데이터 명칭에 대한 표준화 원칙을 보완하고자 할 때, 고려할 사항으로 가장 부적절한 것은?",c:["업무적 명칭과 기술적 명칭을 구별하여 활용해야 한다.","해당 개념을 유일하게 구분해주는 이름으로 명명되어야 한다.","업무적 관점에서 보편적으로 인지되는 이름이어야 한다.","이름만으로 데이터의 의미 및 범위가 파악될 수 있도록 명명되어야 한다."],a:0,ex:"83번과 동일. '업무적·기술적 명칭 구별'은 공식 명칭 원칙이 아님."},
{n:89,q:"칼럼(Column)에 대한 성질을 그룹핑한 개념으로 문자형, 숫자형, 일자형, 시간형과 같이 동일한 형식을 부여하기 위해 사용하는 표준화 요소로 적절한 것은?",c:["표준 용어","표준 코드","도메인 유형","표준 도메인"],a:3,ex:"칼럼 성질을 그룹핑하여 동일한 형식을 부여 = 표준 도메인."},
{n:90,q:"데이터 관리자와 데이터베이스 관리자의 각 직무별 내용으로 부적절한 것은?",c:["주요 활동 — DA: 데이터 정책·표준 정의 / DBA: DB 성능 개선 방안 수립","품질수준 확보 — DA: 데이터 정합성 검증 / DBA: 데이터 표준 적용","전문기술 — DA: 업무지식+데이터 모델링 / DBA: DBMS 전문지식+데이터 모델 해독","주요 관리기능 — DA: 데이터 모델+표준 관리 / DBA: 데이터 보안+성능 관리"],a:1,ex:"품질 수준 항목에서 DA↔DBA가 바뀌어 있음. DA=표준 적용으로 품질 확보, DBA=정합성 검증으로 품질 확보."},
{n:91,q:"표준 단어 지침 작성 시 포함되는 내용과 가장 거리가 먼 것은?",c:["영문 약어명과 영문 약어명에 대한 허용길이를 정의한다.","표준 단어에 대한 정의 기술 방법을 정의한다.","데이터 형식(숫자, 문자)을 어떻게 적용 할 것인가를 정의한다.","동음이의어, 이음동의어에 대한 처리 기준을 정의한다."],a:2,ex:"데이터 형식 적용 방법은 표준 도메인 지침 내용. 표준 단어 지침이 아님."},
{n:92,q:"데이터 표준화 수립 절차를 순서대로 바르게 나열한 것은? [ㄱ.표준화 원칙 수립 ㄴ.요구사항 수집 ㄷ.검토 및 확정 ㄹ.데이터 표준 이행 ㅁ.데이터 표준 공표]",c:["ㄱ - ㄴ - ㄷ - ㄹ - ㅁ","ㄴ - ㄱ - ㄷ - ㅁ - ㄹ","ㄴ - ㄱ - ㄷ - ㄹ - ㅁ","ㄱ - ㄴ - ㄹ - ㄷ - ㅁ"],a:1,ex:"ㄴ(요구수집)→ㄱ(원칙수립)→ㄷ(검토확정)→ㅁ(공표)→ㄹ(이행). 공표 후 이행이 맞음."},
{n:93,q:"수립된 데이터 표준화가 가져올 기대효과로 가장 부적합한 것은?",c:["사용하는 명칭이 통일됨으로써 명확한 의사소통이 가능해진다.","일관된 데이터 형식 및 규칙의 적용으로 인한 데이터 품질이 향상된다.","동일한 형식으로 변환되어 인터페이스 데이터의 재변환 시간이 증가한다.","필요한 데이터의 위치를 파악하는 시간 및 노력이 감소한다."],a:2,ex:"'재변환 시간이 증가한다' → 틀림. 동일한 형식으로 표준화되면 재변환 시간이 감소함."},
{n:94,q:"'해외자동차보유여부' 항목에서 입력이 없을 때 '아니오'가 자동으로 입력되도록 하는 설정으로 적합한 것은?",c:["코드 허용 범위 설정","코드 허용값 설정","코드 인스턴스 설정","기본 값 설정"],a:3,ex:"입력 없을 때 '아니오' 자동 입력 = 기본값(Default) 설정."},
{n:95,q:"표준 용어의 생성 과정이나 변경에 있어 직접적인 영향으로 거리가 먼 것은?",c:["표준 단어","표준 도메인","표준 코드값","기존 업무 용어"],a:2,ex:"표준 코드값은 표준 용어 변경과 직접적 연관이 없음. 단어·도메인·기존 업무 용어는 직접 영향."},
{n:96,q:"전사적 관점에서 수립된 데이터 표준화의 기본 원칙으로 가장 부적절한 것은?",c:["영문명(물리명) 전환 시에 발음식(예: 주소 → Juso, 시 → Si 등)도 허용한다.","기업 내에서 빈도수 및 업무를 고려하여 사용하는 관용어를 우선 사용한다.","한글명에 대해서는 복수의 영문명을 허용한다.","한글명 및 영문명에 특수문자(/, _, -, +, ( )) 및 띄어쓰기를 허용하지 않는다."],a:2,ex:"'한글명에 복수 영문명 허용' → 틀림. 1:1 원칙 위반."},
{n:97,q:"DA(데이터 관리자)가 수행하는 역할로 가장 거리가 먼 것은?",c:["데이터에 대한 정책과 표준을 정의한다.","부서간 데이터 구조에 대한 이견을 조율한다.","데이터베이스에 대한 성능 개선 방안을 수립한다.","데이터 모델을 관리하고 유지한다."],a:2,ex:"DB 성능 개선 방안 수립 = DBA 역할. DA 역할이 아님."},
{n:98,q:"데이터 표준화 수립을 위한 전체적인 구성요소로 부적합한 것은?",c:["데이터 표준화를 위한 별도의 데이터 관리 조직","데이터 표준화를 효과적으로 진행할 수 있는 표준 절차","실제 원칙이 정립된 데이터 표준","전사 관점의 데이터 구조"],a:3,ex:"'전사 관점의 데이터 구조'는 표준화 구성요소가 아님. 구성요소 = 관리 조직 + 표준 절차 + 데이터 표준."},
{n:99,q:"데이터 표준화 관리도구들의 지원 기능과 가장 거리가 먼 것은?",c:["표준 단어 및 용어를 관리하는 기능 지원","원천 코드에 대한 신규코드 매핑 기능 지원","코드에 대한 코드값을 조회할 수 있는 기능 지원","데이터 모델의 변경에 대한 영향도 분석 기능 지원"],a:3,ex:"'영향도 분석은 메타데이터시스템 주요기능"},
{n:100,q:"신입사원에게 설명한 표준화 내용으로 부적합한 것은?",c:["업무적으로 사용하는 용어에 대한 사내 표준을 정하는 것이 표준 용어 작업이다.","개별 업무시스템의 코드체계를 수립하는 것이 표준 코드 작업이다.","표준 용어를 구성하는 단어에 대한 표준을 정의하는 것이 표준 단어 작업이다.","칼럼에 대한 성질을 그룹핑한 것으로 형식에 대한 표준을 정의하는 것이 도메인 작업이다."],a:1,ex:"'개별 업무시스템의 코드체계 수립' → 틀림. 표준 코드는 전사 코드체계 수립."},
{n:101,q:"신규 표준안을 정의하고자 할 때 필수 필요 절차가 아닌 것은?",c:["데이터 표준화에 대한 요구 사항과 현행 문서를 수집한다.","수립된 데이터 표준화의 문제점을 도출한다.","데이터 표준을 정의하기 위한 원칙과 절차를 수립한다.","표준화 변경에 따른 프로그램 영향도를 파악한다."],a:3,ex:"프로그램 영향도 파악은 변경 관리 단계의 작업. 신규 표준 정의 시 필수 절차 아님."},
{n:102,q:"의미가 동일한 단어(이음동의어)에 대한 정련기법으로 가장 적합한 것은?",c:["한글명 및 영문명을 분석 후에 업무적으로 가장 대표적인 표준 단어를 선택한다.","이음동의어의 경우에는 영문 약어를 기준으로 표준 단어를 선택한다.","동음이의어의 경우에는 활용빈도가 낮은 것을 표준 단어로 선택한다.","시스템에서 가장 많이 사용한 대표 속성을 표준 단어로 선택한다."],a:0,ex:"이음동의어(다른 발음, 같은 의미) 정련 = 한글명·영문명 분석 후 대표 단어 선택."},
{n:103,q:"데이터 표준의 구성요소에 대한 설명으로 부적절한 것은?",c:["표준 용어는 업무적으로 사용하는 용어에 대한 표준을 정의한 것이다.","표준 단어는 표준 용어를 구성하는 단어에 대한 표준을 정의한 것이다.","표준 코드는 개별 업무시스템의 코드체계를 수립한 것을 의미한다.","표준 도메인은 칼럼에 대한 성질을 그룹핑한 것으로 형식에 대한 표준을 정의한 것이다."],a:2,ex:"'표준 코드 = 개별 업무시스템 코드체계' → 틀림. 전사 코드체계 수립이 맞음."},
{n:104,q:"정의된 표준 도메인 중 가장 비효율적인 것은?",c:["여신계좌번호/수신계좌번호 → 계좌번호 도메인, Char(15)","담보설정금액/이체금액/회수금액 → 금액 도메인, Number(18,3)","계좌개설일자/카드사용시작일자 → 일자 도메인, Date","대출상품코드/상품구분코드/가계기업구분코드 → 코드 도메인, Varchar(15)"],a:3,ex:"코드는 고정 길이가 일반적 → Char가 적합. Varchar(가변 길이)는 코드 도메인에 비효율적."},
{n:105,q:"리뷰(Review) 과정에서 별도의 의견 없이 통과된 표준 단어로 가장 적합한 것은?",c:["고객계좌번호","입력자사원번호","최종학력코드","주소"],a:3,ex:"주소 = 단독 의미의 최소 단위 표준 단어. 나머지는 단어 조합으로 만들어진 용어(리뷰 필요)."},
{n:106,q:"코드 표준화 순서에 맞게 바르게 나열한 것은? [ㄱ.As-Is 코드와 To-Be 코드 매핑 ㄴ.현행 코드 관련 자료 수집 ㄷ.코드 도메인 분류 및 중복 제거 ㄹ.동일 의미 코드의 통합]",c:["ㄴ - ㄱ - ㄹ - ㄷ","ㄴ - ㄱ - ㄷ - ㄹ","ㄴ - ㄷ - ㄹ - ㄱ","ㄴ - ㄷ - ㄱ - ㄹ"],a:2,ex:"코드 표준화 순서: ㄴ(현행 자료 수집)→ㄷ(도메인 분류·중복 제거)→ㄹ(동일 의미 코드 통합)→ㄱ(As-Is/To-Be 코드 매핑)."},
{n:107,q:"접두어를 합성 단어로 관리하는 방식에 대한 설명으로 부적합한 것은?",c:["일관된 단어 사전의 모습을 가지지 못한다.","단어 사전의 단어 개수가 많아지지 않는다.","사용자가 이해하기가 쉽고 사용의 편의성이 높다.","물리DB의 허용길이를 넘는 경우가 발생할 가능성이 낮다."],a:1,ex:"'단어개수 많아짐."},
{n:108,q:"기업에서 데이터를 활용할 때 일반적으로 나타나는 문제점으로 부적합한 것은?",c:["데이터의 중복 및 데이터 불일치 현상이 발생한다.","데이터 명칭이나 표준화에 대한 미준수로 동일 데이터의 구별이 어렵다.","데이터 의미에 대한 파악이 어려워서 사용자가 이용하기 어려운 현상이 발생한다.","업무요건 변경에 대해 유연성 있는 대응이 어렵다."],a:3,ex:"'업무요건 변경 유연성 대응 어려움'은 데이터 표준화 미비의 직접적 문제점이 아님. ①②③이 직접적 문제점."},
{n:109,q:"도메인으로 가장 부적절하게 정의된 것은?",c:["코드 15자리","계좌번호 14자리","상품코드 8자리","주민등록번호 13자리"],a:3,ex:"주민등록번호는 개인정보(PII). 도메인명으로 개인정보를 사용하는 것은 보안·개인정보보호 관점에서 부적절."},
{n:110,q:"전사 데이터 표준 원칙 공청회에서 검토해야 할 사항으로 가장 거리가 먼 것은?",c:["표준 단어와 표준 용어 간의 정합성 검토","데이터 표준별 필수입력 사항에 대한 검토","현행 데이터 모델과 데이터 표준의 비교 검토","표준 용어들 사이에 유사 용어가 존재하는지 검토"],a:2,ex:"'현행 데이터 모델과 데이터 표준의 비교 검토는 필요 없다."},
{n:111,q:"현행 코드를 조사하여 코드 표준화를 실시할 때 수집 소스로 가장 적합한 것은?",c:["시스템별 단독/통합코드 관리 테이블","전산담당자 운영 매뉴얼","애플리케이션 내 구현된 로직","화면별 코드 덤프 리스트"],a:0,ex:"시스템별 단독/통합코드 관리 테이블 = 실제 DB에 저장된 코드를 직접 수집. 가장 정확하고 적합."},
{n:112,q:"데이터 표준화 구성요소로 부적절한 것은?",c:["표준화를 위한 별도의 데이터 관리 조직","전사 관점의 데이터 구조","실제 원칙이 정립된 데이터 표준","데이터 표준화를 잘 진행할 수 있는 표준 절차"],a:1,ex:"'전사 관점의 데이터 구조'는 표준화 구성요소가 아님."},
{n:113,q:"표준 용어 '사번'이 '사원번호'로 변경 시 A대리가 검토해야 할 관련 문서로 가장 적합한 것은?",c:["사용자 업무 매뉴얼","전산처리 지침서","보고서 레이아웃","신규로 정의된 코드 명칭"],a:3,ex:"표준 용어 변경 시 코드명칭 또한 반드시 검토."},
{n:114,q:"데이터 표준을 관리하는 프로세스의 4가지 직무별 업무내용으로 가장 부적절한 것은?",c:["업무담당자: 표준 변경을 신청한다.","데이터 관리자: 표준 변경 내용을 업무에 적용한다.","전사 데이터 관리자: 전사 표준원칙의 준수 여부를 검토한다.","데이터베이스 관리자: 표준의 변경으로 인한 물리 DB의 변경사항을 반영한다."],a:1,ex:"'데이터 관리자: 표준 변경 내용을 업무에 적용' → 틀림. 업무 적용은 업무 담당자 역할. 관리자는 검토·승인·조율 담당."},
{n:115,q:"표준 용어 지침에 대한 설명으로 가장 부적절한 것은?",c:["한글명 및 영문명은 30자 이내로 정의한다.","테이블 및 칼럼명에는 특수문자를 사용할 수 없다.","접두(미)사 자체는 반드시 단일로 등록한다.","엔터티명은 엔터티 고유명 및 엔터티 유형을 고려하여 정의한다."],a:2,ex:"'접두사 자체는 반드시 단일로 등록' → 틀림. 접두·접미사는 합성 단어 형태로 관리하는 것이 일반적."},
{n:116,q:"표준 용어 '원금상환합계금액'에서 '원금상환합계'로 변경 시 상대적으로 영향이 가장 적은 것은?",c:["표준 도메인 명칭","표준 전산 지침","표준 단어","표준 코드 명칭"],a:1,ex:"표준 전산 지침은 용어명 변경과 직접적 연관이 없어 영향 가장 적음."},
{n:117,q:"데이터 표준 관리의 전반적인 프로세스에서 신규 및 변경 영향도를 분석하기에 가장 적합한 담당자는?",c:["업무 담당자","데이터베이스 관리자","데이터 관리자","현업 사용자"],a:2,ex:"신규·변경 영향도 분석 = 전사 관점의 데이터 관리자(DA)가 담당."},
{n:118,q:"표준 관리 시스템의 기능이 아닌 것은?",c:["표준 준수 검토","물리 DB 반영","변경 영향 파악","표준 등록"],a:1,ex:"'물리 DB 반영' = DBA의 업무. 표준 관리 시스템의 기능이 아님."},
{n:119,q:"데이터 표준 수립 후 지속적인 데이터 표준 관리를 위해 수립해야 하는 업무 프로세스로 가장 부적합한 것은?",c:["데이터 표준 변경 관리 프로세스","데이터 표준 변경에 따른 영향도 분석 프로세스","데이터 표준 준수 체크 프로세스","데이터 표준 정의 프로세스"],a:3,ex:"'표준 정의 프로세스'는 수립 단계의 작업. 수립 '후' 관리 프로세스가 아님."},
{n:120,q:"데이터 관리자(Data Administration)의 담당업무로 가장 거리가 먼 것은?",c:["표준 준수여부를 체크하거나 검토한다.","업무 담당자에게 변경작업 지시 후에 결과를 확인한다.","전사 관점에서 가이드 자문 및 방향을 제시한다.","신규 및 변경사항에 대한 업무 범위를 체크한다."],a:1,ex:"'업무 담당자에게 변경작업 지시'는 DA 역할이 아님. DA는 조율·검토·가이드 역할."},
],
4:[
{n:121,q:"데이터 모델링의 기본 원칙으로 거리가 먼 것은?",c:["커뮤니케이션 원칙","솔루션 구체화 원칙","모델링의 상세화 원칙","논리적 표현 원칙"],a:1,ex:"데이터 모델링 3대 원칙 = 커뮤니케이션 원칙·모델링 상세화 원칙·논리적 표현 원칙. '솔루션 구체화 원칙'은 해당 없음."},
{n:122,q:"관계 실체의 모든 외부 식별자 값은 관련 있는 관계 실체에 주 식별자 값이 존재해야 한다. 이에 해당하는 규칙은?",c:["실체 무결성 규칙","참조 무결성 규칙","영역 무결성 규칙","속성 무결성 규칙"],a:1,ex:"외부 식별자(FK) 값이 관련 테이블의 PK에 존재해야 한다 = 참조 무결성 규칙."},
{n:123,q:"개체-관계 모델에 대한 설명으로 틀린 것은?",c:["모델의 단순성 때문에 현재 광범위하게 사용되고 있다.","확장된 개체-관계 모델은 서브타입을 포함한다.","연관과 상속의 개념을 통해 객체들을 연결한다.","서로 다른 뷰들을 하나로 통합할 수 있는 단일화된 설계안을 만들 수 있다."],a:2,ex:"③은 개체-관계 모델이 아니라 객체지향 모델링에 대한 설명."},
{n:124,q:"데이터의 특성이 아닌 것은?",c:["데이터는 중복적이다.","데이터는 조직과 기술에 비해 독립적이다.","데이터는 프로세스에 비해 안정적이다. 즉, 변화가 적다.","데이터는 여러 프로세스 또는 기능에서 사용된다."],a:0,ex:"데이터를 중복해서 가지면 데이터 무결성이 깨질 수 있으므로 중복을 피해야 함. 중복성은 데이터 특성이 아님."},
{n:125,q:"소프트웨어 생산성 향상을 위한 객체지향 모델링의 장점이 아닌 것은?",c:["재사용 코드와 같은 개념이 실제로 가능한 환경을 제공한다.","모든 비즈니스 규칙이 표현될 수 있는 유일한 환경을 제공한다.","프로세스와 데이터 모델링을 함께 운영한다.","데이터는 프로세스에 종속되어 운영된다."],a:3,ex:"④는 객체지향 모델링의 장점이 아님. 논리 데이터 모델링은 데이터가 프로세스에 종속하지 않도록 함."},
{n:126,q:"'논리 데이터 모델링'이라는 용어에서 '논리'라는 단어가 사용된 이유로 가장 적합한 것은?",c:["비즈니스에서 발생하는 사실을 중심으로 데이터 구조와 규칙을 파악하기 때문","현실 세계에 실제로 존재하는 장표나 DB 시스템 등과는 독립적으로 비즈니스에 존재하는 사실을 일반화·추상화하기 때문","데이터 모델러가 현실 세계의 비즈니스를 논리적으로 분석해 나가기 때문","시스템 구축을 위하여 기초적인 분석부터 시스템 설계까지 인간의 사고력으로 구현하기 때문"],a:1,ex:"'논리'라는 단어는 논리 데이터 모델링이 현실 세계를 추상화하기 때문에 사용."},
{n:127,q:"사원에 대한 엔터티(Entity)를 구성하려고 할 때, 식별자로 가장 적합한 속성은?",c:["사원명","사원번호","근무부서","담당업무"],a:1,ex:"엔터티의 유일성을 보장해주는 것이 식별자. 사원번호만 유일하게 식별 가능."},
{n:128,q:"'관계형 모델 이론'과 '비관계형 모델 이론'의 차이점으로 가장 부적합한 것은?",c:["관계형 모델 이론은 데이터 중심의 분석 기법이고, 비관계형 모델 이론은 일반적으로 프로세스 중심의 분석 기법이다.","관계형 모델 이론은 데이터의 구조와 조작 및 무결성을 정의하고, 비관계형 모델 이론은 데이터의 구조와 조작을 정의한다.","관계형 모델 이론은 데이터를 집합적으로 처리를 요구하고, 비관계형 모델 이론은 데이터의 레코드 처리를 요구한다.","관계형 모델 이론은 비관계형 모델 이론에 비하여 데이터를 분석하는데 있어 우수한 분석 기법이다."],a:3,ex:"관계형 모델 이론이 데이터를 분석하는데 비관계형 이론보다 반드시 우수하지는 않음."},
{n:129,q:"논리 데이터 모델링에 대한 설명으로 부적절한 것은?",c:["논리 데이터 모델의 특징은 초기에 엔터티 사이가 다대다 관계, 순환 관계, 배타적 관계 등의 관계로 연결된 엔터티들이 많이 보인다.","논리 데이터 모델은 업무영역이 바뀌지 않아도 업무방식이 변경되면 반드시 설계변경이 이루어져야 한다.","논리 데이터 모델링은 프로세스 중심의 설계보다 데이터 중심 설계를 주로 사용한다.","논리 데이터 모델은 하나의 엔터티가 반드시 물리적으로 하나의 테이블이나 세그먼트가 되지 않을 수 있다."],a:1,ex:"잘 설계된 논리 모델은 업무방식이 바뀌어도 업무영역이 바뀌지 않는다면 설계 변경이 거의 발생하지 않음."},
{n:130,q:"관계연산자의 설명이라 볼 수 없는 것을 모두 고르시오. [정답: ④]",c:["Select(or Restrict): 열(Column)에 의거한 행(Row)의 Subset","Product: 두 관계 테이블 간의 행(Row) 조합의 붐음","Division: 다른 관계 테이블의 모든 행에 대응하는 열을 제외한 열","Insert: 행의 입력"],a:3,ex:"④ Insert는 관계 연산자가 아니라 처리 연산자. 관계 연산자 = Select, Product, Division, Join, Project 등."},
{n:131,q:"본질적 데이터 요구 사항이며 데이터베이스 설계를 시작하기 위한 필수 사항으로 거리가 먼 것은?",c:["이름(Name): 모든 속성은 고유하게 식별할 수 있는 이름이 주어져야 한다.","명세(Description): 모든 실체는 명세가 있어야 하며, 명세는 누구든지 실체를 정확히 해석할 수 있도록 해주어야 한다.","유형(Type): 속성은 키 속성 또는 비키 속성 중 하나로 구분되지 않으면 안 된다.","도출 속성(Derived Attributes): 데이터 모델링 팀은 업무 전문가의 참여 하에 도출 공식을 확립해야 한다."],a:3,ex:"④는 도출 속성에 대한 설명이 아니라 도출 공식에 관한 설명."},
{n:132,q:"처리연산자의 설명으로 볼 수 없는 것을 모두 고르시오. [정답: ③]",c:["Update: 행의 수정","Delete: 행의 삭제","Project: 열(Column)의 Subset","Insert: 행의 입력"],a:2,ex:"③ Project는 처리 연산자가 아니라 관계 연산자. 처리 연산자 = Insert, Update, Delete."},
{n:133,q:"속성 이름을 부여할 때, 주요 규칙에 대한 설명으로 부적합한 것은?",c:["속성 이름은 해당 속성에 의해 구체화된 논리적 개념을 현업에게 즉시 전달해야 한다.","모델러들은 물리적 특성이 아닌 논리적 고려에 따라 속성 이름을 부여한다.","속성의 개념을 구체적이고 명확하게 정의하였다면 보편적인 용어를 적절히 결합한 복합사를 만들어서 속성이름을 부여할 수 있다.","'학력'이라는 단어가 포괄적이고 여러 함축성 있게 사용할 수 있으므로 속성명으로 더욱 적합하다."],a:3,ex:"누구나 같은 의미로 정확하게 뜻을 알 수 있는 단어를 사용해야 함. '학력'보다 '최종학력' 같이 명확한 이름이 적합."},
{n:134,q:"주 식별자(특정 행을 유일하게 인식하는 하나 이상의 열)는 Null 값을 포함하지 않는다. 이에 해당하는 규칙은?",c:["실체 무결성 규칙(Entity Integrity Rule)","참조 무결성 규칙(Reference Integrity Rule)","영역 무결성 규칙(Domain Integrity Rule)","속성 무결성 규칙(Attribute Integrity Rule)"],a:0,ex:"주 식별자(PK)는 Null 값을 포함하지 않는다 = 실체 무결성 규칙. 참조 무결성은 관계에 관한 것."},
{n:135,q:"아크(Arc) 관계의 특징이 아닌 것은?",c:["아크 내에 있는 관계는 보통 동일하다.","아크 내에 있는 관계는 항상 Mandatory거나 Optional이어야 한다.","아크는 여러 엔터티를 가질 수 있다.","어떤 엔터티는 다수의 아크를 가질 수 있다. 그러나 지정된 관계는 단 하나의 아크에만 사용되어야 한다."],a:2,ex:"아크는 반드시 하나의 엔터티에만 속해야 함. 하나의 아크가 여러 엔터티를 가질 수 없음."},
{n:136,q:"참조 무결성 규칙의 입력 규칙에 대한 설명으로 틀린 것은?",c:["Dependent: 대응되는 부모 실체에 인스턴스가 있는 경우에만 자식 실체에 입력을 허용한다.","Nullify: 자식 실체 인스턴스의 입력을 항상 허용하고, 대응되는 부모 건이 없는 경우 자식 실체의 Foreign Key를 Null 값으로 처리한다.","Customized: 특정한 검증조건이 만족되는 경우에만 자식 실체 인스턴스의 입력을 허용한다.","Default: 자식 실체 인스턴스의 입력을 항상 허용하고, 대응되는 부모 건이 없는 경우 자식 실체의 Primary Key를 지정한 기본값으로 처리한다."],a:3,ex:"④ Default는 Foreign Key를 지정된 기본 값으로 처리하는 것. Primary Key가 아님."},
{n:137,q:"속성을 검증하는 작업과 거리가 먼 것은?",c:["원자단위 검증: 속성은 독자적인 성질을 가져야 한다.","유일값(Single Value) 검증: 속성에서 관리되어야 할 값이 반드시 단 하나만 존재해야 한다.","추출값(Derived Value) 검증: 속성이 원천적인 값인지 다른 속성에 의해 가공된 값인지를 검증해야 한다.","속성 후보 선정: 구 시스템 문서자료, 현업 장표 및 보고서, 타 시스템 등에서 속성 후보를 선출해야 한다."],a:3,ex:"④는 속성 검증이 아니라 속성 후보를 확보하는 방법을 설명한 것."},
{n:138,q:"데이터 무결성과 관계된 사항으로 적합한 것은? [ㄱ.실체무결성 ㄴ.연쇄작용 ㄷ.참조무결성 ㄹ.영역무결성 ㅁ.정규화 ㅂ.인덱스]",c:["ㄱ, ㄷ, ㄹ","ㄱ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ","ㄱ, ㄴ, ㄷ, ㄹ, ㅁ, ㅂ"],a:2,ex:"인덱스(ㅂ)는 수행 성능 향상을 위한 기법으로 데이터 무결성과는 관계없음. 나머지 ㄱ~ㅁ은 무결성 관련."},
{n:139,q:"엔터티 검증과 가장 거리가 먼 것은?",c:["엔터티의 개념을 확실하게 모델러들이 정립해야 한다.","새로운 목적 시스템에서 관리하고자 하는 대상 집합이 있는지 확인해야 한다.","엔터티에 가로(속성)와 세로(개체)를 가진 면적(집합)을 가진 속성이 존재하는지 확인해야 한다.","엔터티 후보를 우선적용 대상별로 분류하여 모델링의 골격에 해당하는 주요 엔터티를 먼저 도출하여 명확히 정의한다."],a:3,ex:"④는 모델링을 순차적으로 접근해 가야 할 형태별로 분류하는 이유이지 엔터티 검증과는 거리가 멀다."},
{n:140,q:"아직 대학 졸업장을 가지지 못한 전도유망한 사람을 고용하는 회사의 ERD에서 틀린 부분은? [ERD: 대학학위유형 → 사원취득대학학위 → 사원]",c:["틀린 곳이 없다.","대학 학위 유형을 아직 가지지 않았으므로 '대학학위유형'과 '사원취득대학학위'가 양쪽 선택적으로 표현돼야 한다.","사원이 대학 학위를 미취득 했을 가능성이 있으므로 '사원'과 '사원취득대학학위' 사이에 사원 쪽을 점선(선택적)으로 표시해야 한다.","대학 학위 유형을 아직 가지지 않았으므로 '사원'과 '사원취득대학학위'가 양쪽 선택으로 표현되어야 한다."],a:2,ex:"아직 학위 미취득자를 고용하므로 사원과 사원취득대학학위 사이에서 사원 쪽을 한쪽 선택적으로 표현해야 함."},
{n:141,q:"데이터 모델링 단계에 대한 설명으로 잘못된 것은?",c:["개괄 모델 단계: 현행 시스템의 프로세스와 데이터베이스를 분석하여 분류 가능한 범주를 분석하는 단계","개념 모델 단계: 핵심 엔터티를 도출하고 그들간의 관계를 정의하는 단계","논리 모델 단계: 업무에서 필요로 하는 모든 엔터티와 특성을 정의하는 단계","물리 모델 단계: 논리데이터 모델을 기반으로 특정 DB에 맞도록 스키마를 설계하는 단계"],a:0,ex:"①번은 개념 데이터 모델 단계의 일부분 설명임."},
{n:142,q:"속성의 정의를 바르게 설명한 것을 모두 고르시오. [복수 정답: ③④]",c:["구별 가능한 사람, 장소, 물선, 행위 또는 개념 등에 대하여 정보가 유지되어야 하는 것","다른 것과 구별되어 식별될 수 있는 사물","더 이상 분리되어지지 않는 단위 값(Atomic Value)","실체를 서술하며 양을 계수화하고 자격을 부여·분류하며 구체적으로 기입하는 정보항목"],a:2,ex:"①②는 실체 정의 설명. ③④가 속성 정의 설명."},
{n:143,q:"식별자에 대한 설명으로 틀린 것은?",c:["식별자는 하나 또는 그 이상의 개체 속성으로 구성된다.","식별자와 키는 일치성을 가지며 식별자는 테이블을 위한 것이며 키는 개체가 가진다.","Barker 표기법은 식별자를 '#'로 표현한다.","직원 인스턴스인 경우 봉급이나 입사일은 식별자가 될 수 없다."],a:1,ex:"식별자는 개체를 위한 것이며, 키는 테이블이 가진다. (②번에서 식별자↔키 반대로 서술됨)"},
{n:144,q:"아래 ERD에서 엔터티 유형명으로 부적당한 것을 모두 고르시오. [복수 정답: ①③] [영업담당자/당초계약/규손금/상담]",c:["영업담당자: 표현 그대로 영업을 담당한 사람을 말한다.","당초계약: 실행계약이 이루어지기 전에 처음으로 이루어지는 계약을 의미한다.","규손금: 규정에 의하여 결정되는 손해액을 의미한다.","상담: 고객과의 상담내역을 의미한다."],a:0,ex:"①영업담당자는 역할 기반 명칭(일반화·추상화 위배). ③규손금은 '규정손실금'의 약어로 논리 데이터 모델링에서 삼가야 할 명칭."},
{n:145,q:"144번 ERD의 잘못된 사항으로 올바른 것을 모두 고르시오. [복수 정답: ②③]",c:["'영업담당자'와 '상담'의 관계에 UID Bar를 사용해야 한다.","'실행계약'과 '규손금'의 관계는 1:M인데 업무를 파악하여 PK 속성 추가 또는 카디날리티를 수정해야 한다.","'당초계약'과 '실행계약'이 양쪽 필수 관계인데 일반적으로 비즈니스와 맞지 않아 한쪽을 선택적 관계로 바꾸는 것이 합리적이다.","'실행계약'이 이루어지려면 반드시 '당초계약'이 있어야 하므로 양쪽 필수 관계가 맞다."],a:1,ex:"②③이 맞음. 상담 인스턴스 인식 시 영업담당자가 누구인지 반드시 알 필요 없어 UID Bar 불필요. 당초계약 시 실행계약이 동시 발생하지 않으므로 양쪽 필수 관계 부적절."},
{n:146,q:"서브타입에 대한 설명으로 틀린 것은?",c:["서브타입 개체는 그것의 슈퍼타입이라는 불리는 다른 개체의 특별한 경우이다.","서브타입은 배타적이지만 포괄적이지는 않다.","슈퍼타입은 서브타입에 공통적인 모든 속성을 포함한다.","모든 슈퍼타입이 구분자를 가지고 있는 것은 아니다."],a:1,ex:"서브타입은 배타적이며 포괄적이다. '포괄적이지는 않다'는 틀린 설명."},
{n:147,q:"객체지향 모델링과 논리 데이터 모델링의 대응 개념이 잘못 짝지어진 것은?",c:["객체 - 엔터티","연결 - 관계","객체 클래스 - 엔터티 인스턴스","메세지 - 대응 개념 없음"],a:2,ex:"객체 클래스 = 엔터티 유형(Entity Type). 엔터티 인스턴스가 아님."},
{n:148,q:"아래 바커 표기법의 실체와 관계 조건 표에서 틀린 것은? [ㄱ:1:1 선택/ㄴ:1:M 선택/ㄷ:1:M 필수/ㄹ:N:M 필수]",c:["ㄱ","ㄴ","ㄷ","ㄹ"],a:3,ex:"ㄹ은 바커 표기법의 관계가 아니라 I/E 표기법의 관계(Relationship) 예임."},
{n:149,q:"배타관계에 대한 설명으로 틀린 것은?",c:["논리적으로 엔터티 간의 업무적 연관성을 명확하게 표현하고 있다.","배타관계에 있는 관계는 보통 동일하다.","배타관계는 반드시 하나의 엔터티에만 속해야 한다.","배타관계에 의한 논리적인 명확성은 물리 설계에도 그대로 반영되는 것이 효율적이다."],a:3,ex:"배타관계의 논리적 명확성이 물리 설계에 그대로 반영될 필요 없음. 성능·유연성 고려 시 통합하여 물리 모델로 정의할 수 있음."},
{n:150,q:"관계 표현식에 대한 설명으로 틀린 것은?",c:["식별성(Identification) 표시","선택성(Optionality) 표시","기수성(Degree, Cardinality) 표시","전이성(Transferability) 표시"],a:3,ex:"보통 관계형 모델링에서 비전이성은 별도로 표시하지만 전이성은 표현하지 않음."},
{n:151,q:"개념 모델링 단계에서 할 일로 적절한 것은?",c:["주제영역 정의","정규화","속성 정의","참조무결성 정의"],a:0,ex:"정규화·속성 정의·참조 무결성 정의는 논리 데이터 모델링 과정에서 정의. 개념 모델링 단계 = 주제영역 정의."},
{n:152,q:"조직의 변경 및 통폐합이 발생하면서 관리의 어려움이 발생했을 때 해결하는 모델링 기법으로 가장 적합한 것은?",c:["정규화(Normalization) 기법","슈퍼/서브타입(Super/Sub Type) 기법","상호 배타적(Mutually Exclusive) 관계 기법","순환(Recursive) 관계 기법"],a:3,ex:"부서는 조직의 업무에 따라 수시로 바뀌기 때문에 유연하게 대응하기 위해서는 순환 관계 기법으로 모델링."},
{n:153,q:"전체 비즈니스를 데이터 관점에서 분류하는 작업에서 부적절한 것은?",c:["주제영역은 기업이 사용하는 데이터의 최상위 집합이다.","데이터를 하향식으로 분석하는데 유용하다.","주제영역 정의 시에 계층적 표현은 복잡성을 증가시킨다.","주제영역을 분해하면 하위 수준의 주제영역이나 엔터티가 나타난다."],a:2,ex:"주제영역을 계층적으로 표현하고 Top-Down 방식으로 데이터 모델을 생성하는 것은 체계적인 분석에 도움이 됨."},
{n:154,q:"주제 영역에 대한 설명으로 가장 부적합한 것은?",c:["주제 영역은 시스템의 대상이 되는 업무를 명배하게 구분이 가능한 단위 업무로 분리하는 개념이다.","주제 영역을 결정할 때는 주제 영역 내부에 존재하게 될 개체들이 높은 결합성(High Cohesion)을 유지하게 해야 한다.","주제 영역을 정의함으로써 요구 사항 검증 시에 기준으로 활용할 수 있으며, 생산성 향상과 개발 기간 단축이 가능하다.","데이터 모델과 프로세스 모델은 별개로 진행될 수 있지만 상호 보완적인 위치에 있고 주제 영역은 프로세스 모델링의 기능(Function)과 매핑되는 것이 보통이다."],a:2,ex:"하나의 주제영역에 존재하는 데이터 개체들은 높은 결합성을 갖도록 설계. ③의 생산성 향상·개발기간 단축은 주제영역 활용 장점으로 보기 어려움."},
{n:155,q:"주제영역 활용의 장점으로 가장 부적절한 것은?",c:["데이터 및 업무활동 모델의 품질보증이 용이함","생산성이 향상되고 개발기간 단축이 용이함","프로젝트 관리가 용이함","모델 개발조정이 용이하고 요구사항 검증 시 기준으로 활용 가능함"],a:1,ex:"주제영역 활용이 생산성 향상과 관계가 적으며, 주제영역 활용으로 프로젝트 전체 개발 기간이 단축된다고 볼 수 없음."},
{n:156,q:"개념 데이터 모델링 단계에서 동산 관리 대장 장표를 가지고 모델러가 수행할 내용으로 가장 적합한 것은?",c:["'구입처'에 어떤 값들이 들어갈 수 있는지 업무 담당자와 인터뷰를 통해서 조사하고, '고객' 데이터와 관계를 생성할 수 있는지를 파악한다.","'동산'이라는 용어를 엔터티 후보로 판단하여 업무 담당자와 인터뷰를 통해 동산의 의미를 조사하고, 동산에 대한 간단한 정의를 정리한다.","'동산상태'에 대해서 이력 관리의 유무를 업무 담당자와 협의한다.","현재 장표에서 '소속점명'이 이름으로만 관리되고 있지만, 향후 소속점을 관리하는 다른 엔터티와 관계로 표현될 것이기 때문에 엔터티 후보 대상에서 제외하기로 결정한다."],a:1,ex:"개념 데이터 모델링 단계에서는 '동산' 같은 핵심 엔터티 후보의 의미 파악이 적절. '고객'과의 연관관계 등은 논리 데이터 모델링 단계에서 검토."},
{n:157,q:"주제영역 후보 도출의 방법으로 부적절한 것을 모두 고르시오. [복수 정답: ③④]",c:["업무에서 사용하는 데이터의 명사형을 도출","업무기능의 이름으로부터 도출","중요 보고서 제목을 참조하여 도출","시스템 관리자 의견을 참조하여 도출"],a:2,ex:"③중요 보고서 제목은 향후 정의될 엔터티 후보가 될 수 있으나 주제영역 후보 도출과는 거리가 있음. ④시스템 관리자보다는 업무 관리자의 의견을 참조해야 함."},
{n:158,q:"모델 관계가 잘못 표기된 것은? (바커 CASE*Method 방식)",c:["[실체A] ——-< [실체B] (1:M, 실체A 필수, 실체B 선택)","[실체A] >-——-< [실체B] (N:M, 실체A 선택, 실체B 선택)","[실체A] —·——-< [실체B] (1:M, 실체A 선택, 실체B 선택)","[실체A] >-——— [실체B] (N:1, 실체A 선택, 실체B 필수)"],a:1,ex:"②에서 한쪽에 인스턴스를 입력하려면 다른 쪽에 반드시 값이 있어야 한다는 것이 모순. 한쪽을 양쪽 선택적 관계로 바꾸어야 함."},
{n:159,q:"엔터티 후보 선정을 수행할 때 유의사항으로 적절한 것은?",c:["엔터티 가능성이 있다고 예상되면 예외사항 검토 등을 통해 상세분석을 한다.","동의어처럼 보이더라도 함부로 버리지 않는다.","개념이 모호한 대상은 일단 넘어간다.","예외처리는 중요하므로 잘 분석하고 정리해 놓는다."],a:1,ex:"개념 데이터 모델링에서 엔터티 상세 분석·이력 관리·예외처리는 이 단계에서 수행하지 않음. 동의어처럼 보이더라도 함부로 버리지 않는 것이 적절."},
{n:160,q:"모델러가 엔터티 식별 단계에서 수행해야 하는 행동으로 가장 부적절한 것은?",c:["'고객' 엔터티에서 관리해야할 구체적인 '생년월일' 속성에 대해서 업무 담당자들과 협의한다.","후보 엔터티가 정확히 어떤 개념인지를 파악하기 위해서 동종의 비즈니스 관련 서적에서 관련 개념을 파악한다.","인터넷을 통하여 해당 후보 엔터티의 용어적인 의미를 파악하기 위해서 자료를 검색한다.","특정 업종에서만 사용하는 용어라서 모델러가 판단하기 힘들면 주변에 존재하는 비유를 들어서 업무 담당자와 개념에 대한 동질성을 파악한다."],a:0,ex:"엔터티 후보 식별 단계에서 일반속성(생년월일)을 언급하는 것은 부적절. 이 단계는 엔터티의 개념 파악이 목적."},
{n:161,q:"엔터티를 분류할 때 의미가 다른 것은?",c:["Key Entity","Main Entity","Intersection Entity","Action Entity"],a:2,ex:"Intersection Entity(교차 엔터티)는 M:M 관계 해소로 생기는 엔터티로 개념 데이터 모델이 아닌 논리 데이터 모델링 단계에서 생성. 나머지는 역할에 따른 분류."},
{n:162,q:"상호 배타적 관계를 잘못 표기한 것을 모두 고르시오. [복수 정답: ②④]",c:["[실체A] —·——⊗ [실체B] / [실체A] —·——⊗ [실체C] (둘 다 선택)","[실체A] —·——⊗ [실체B] / [실체A] —·——○ [실체C] (한쪽만 배타기호)","[실체A] ——⊗ [실체B] / [실체A] ——⊗ [실체C] (둘 다 필수)","[실체A] ——⊗ [실체B] / [실체A] —·——⊗ [실체C] (하나 필수, 하나 선택)"],a:1,ex:"배타적 관계는 모두 선택적이든지 또는 모두 필수적이어야 함. ②④는 한쪽만 선택·한쪽만 필수로 잘못 표기."},
{n:163,q:"K모델러의 판단으로 부적절한 것을 모두 고르시오. [복수 정답: ③④]",c:["부서는 키 엔터티이다.","부서 엔터티는 여러 조직간의 상하 관계를 표현하기 위해서 재귀관계를 생성하기로 한다.","부서 엔터티와 연관된 하위 엔터티들을 차례로 정의해 나간다.","부서 엔터티의 속성들을 확정하여 부서 엔터티의 모든 부분들을 확정해 나간다."],a:2,ex:"③④는 개념 데이터 모델링에서 부서 엔터티와 연관된 하위 엔터티·속성을 정의하는 것으로 수평적 사고를 방해할 위험이 있어 부적절."},
{n:164,q:"후보키에 대한 설명으로 가장 거리가 먼 것은?",c:["각 인스턴스를 유일하게 식별할 수 있어야 한다.","해당 후보키 이외의 나머지 속성들을 직접 식별할 수 있어야 하는 것은 아니다.","후보키의 데이터들은 가능하면 자주 변경되지 않는 것이 좋다.","가능하면 키길이가 작은 속성들을 선택하는 것이 바람직하다."],a:1,ex:"후보키는 후보키 이외의 나머지 속성들을 직접 식별할 수 있어야 함. 이를 어기면 2·3정규화 위배."},
{n:165,q:"성격기준으로 데이터를 분류하는 방법의 장점으로 가장 거리가 먼 것은?",c:["엔터티 후보들간의 미묘한 차이를 분석하는데 유리하다.","엔터티 통합여부 판단의 기초가 된다.","엔터티의 정의를 견고하게 할 수 있다.","주제영역 분류의 기준을 제공한다."],a:3,ex:"엔터티 후보 도출 단계에서 주제영역 분류에 대한 언급은 부적절."},
{n:166,q:"아래 ERD의 직렬 관계의 특성으로 틀린 것을 모두 고르시오. [복수 정답: ③] [실체A —·——< 실체B >—·—— 실체C]",c:["새로운 테이블이 추가됨","인덱스 수가 감소될 가능성이 높음","여러 개의 속성으로 나누어짐","변화에 유리함 (로우만 추가됨)"],a:2,ex:"직렬 관계는 여러 개의 로우(Row)로 나누어짐. '여러 개의 속성으로 나누어짐'은 틀린 설명."},
{n:167,q:"본질 식별자에 대한 설명으로 부적절한 것은?",c:["카드 회사의 데이터 모델링 과정에서 나올 수 있는 '신용카드'의 '카드번호'는 본질 식별자에 해당한다.","1:M 관계에서 1쪽의 식별자가 M쪽에서 항상 식별자로 되는 것은 아니다.","인조 식별자(Artificial Unique Identifier)도 때로는 본질식별자가 될 수 있다.","본질 식별자는 만약 본질 식별자를 이루는 속성이 없을 때 자신이 절대로 태어날 수 없는 경우에만 해당한다."],a:0,ex:"신용카드의 카드번호는 인조 식별자에 해당. 실제 본질 식별자는 고객번호·카드상품코드·카드발급일시 등."},
{n:168,q:"'계약속성정보A'와 같은 방식의 관리에 대한 설명으로 부적절한 것은?",c:["가장 큰 장점은 어떠한 속성이 추가 되더라도 데이터 모델에는 변화를 주지 않는다는 것이다.","가장 큰 단점은 해당 엔터티에 대한 조건 검색이나 빈번한 액세스가 발생한다면 불리해진다는 것이다.","ERP와 같은 패키지에서 자주 사용되어지는 데이터 모델링 기법이다.","이 방식에서 속성정보의 이력을 관리하기 위해서는 새로운 엔터티를 추가하여야 한다."],a:3,ex:"이력 관리를 위해서는 추가 UID 속성을 추가하여 관리하는 것이 일반적인 방법. 새로운 엔터티를 추가할 필요는 없음."},
{n:169,q:"개념 데이터 모델링 단계에서 코드성 엔터티의 처리에 대해 적절한 것은?",c:["코드성 엔터티는 키 엔터티로 볼 수 있다.","코드 속성을 코드성 엔터티로 도출해 놓으면 데이터 모델이 복잡성의 함정에 빠질 수 있으므로 엔터티로 도출하지 않는 것이 좋다.","코드 속성이 의미상의 주어가 된다면 반드시 코드성 엔터티로 정의해 주어야 한다.","코드성 엔터티의 도출은 개념 데이터 모델을 보다 상세하게 정의할 수 있기 때문에 꼭 필요한 과정이다."],a:0,ex:"대부분의 코드성 엔터티는 개념 데이터 모델링 단계에서 굳이 엔터티로 도출하지 않아도 무관. 그러나 코드성 엔터티가 여러 하위 엔터티를 가지는 경우에는 예외."},
{n:170,q:"논리 데이터 모델링을 수행할 때 고려할 사항으로 가장 거리가 먼 것은?",c:["특정한 응용프로그램이나 기술에 특화되지 않고 다수에 의해 사용 가능해야 한다.","현재 상태를 근간으로 최소한의 노력을 통해 새로운 요구 사항을 수용할 수 있어야 한다.","업무가 데이터를 이용하고 관리하는데 있어서 데이터 값의 일관성이 있어야 한다.","업무가 데이터를 이용하고 수행하는데 있어서 적절한 속도를 보장해야 한다."],a:3,ex:"수행 성능은 물리적인 요소(인덱스, 저장 기법 등). 논리 데이터 모델링 고려 사항과 거리가 멀다."},
{n:171,q:"실제 데이터 모델링 과정에서 엔터티 정의의 판단 기준을 부적절하게 설명한 것은?",c:["보험사에서 '피보험자', '납입자' 등은 업무 중심에 존재하는 매우 중요한 엔터티이다.","'고객'은 엔터티 후보라고 볼 수 있지만, '불량거래자'는 엔터티 후보라고 보기에는 무리이다.","'금융기관'은 '금융'과 '기관'의 합성어 형태이고, 엔터티로 정의할 수도 있다.","'배송처'는 순수 본질 집합이 아니지만 경우에 따라서는 엔터티로 정의될 수도 있기 때문에 이 과정에서 엔터티 후보로 도출하는 것은 가능하다."],a:0,ex:"대부분의 보험사에서 피보험자·납입자 등은 엔터티라기 보다는 고객 엔터티와 계약 엔터티와의 관계로 보는 것이 더 합당."},
{n:172,q:"아래의 관계형 모델이 위배하고 있는 성격으로 적합한 것은? [계좌번호를 지점코드+상품코드+년도+순번을 합쳐서 구성 / 구매일자를 구매년도·구매월·구매일로 분리]",c:["속성 원자성","속성 무결성","속성 단순성","속성 중복성"],a:0,ex:"속성 원자성은 관계형 모델의 이론적 배경. 비즈니스에서 의미 있는 최소한의 속성 단위여야 함."},
{n:173,q:"서브타입 엔터티에 대한 설명으로 부적절한 것을 모두 고르시오. [복수 정답: ③④]",c:["서브타입 간에는 교집합이 존재하지 않아야 한다.","서브타입을 모두 합하면 반드시 전체 집합이 되어야 한다.","서브타입은 물리 데이터 모델에서 별개의 테이블로 분할 된다.","서브타입의 사용은 가독성을 증진시키지만 물리 데이터 모델 전환 시에 복잡성이 증가하는 단점을 갖고 있다."],a:2,ex:"③서브타입은 물리 데이터 모델에서 별개 테이블로 분할되거나 하나의 테이블로 병합될 수 있음. ④물리 모델로 전환하기 위한 기준을 마련하면 복잡성이 증가하지 않음."},
{n:174,q:"개념 데이터 모델에서 '설비타입'에 대한 모델러의 판단으로 가장 부적절한 것은?",c:["'설비타입'이 오로지 설비들을 분류하는 용도로만 사용된다고 판단했다면 굳이 지금 단계에서 엔터티로 정의하지 않을 수도 있다.","만약 '설비타입'과 '생산라인' 별로 관리하고자 하는 '공정제어' 값들이 있다면 '공정제어' 집합에 대한 자세한 분석을 실시한다.","'설비타입' 엔터티가 다른 속성을 가질 수 있는지를 확인하기 위해서 업무 담당자와 협의한 후에 가능성이 있다고 판단되면 엔터티로 정의한다.","'설비타입' 엔터티 후보가 다른 엔터티와의 관계, 특히 자식관계가 없다고 판단하여 엔터티 정의에서 제외하기로 하였다."],a:1,ex:"공정제어 집합에 대한 분석은 개념 데이터 모델링 단계에서 언급할 부분이 아님."},
{n:175,q:"서브타입의 적용 기준으로 부적합한 것을 모두 고르시오. [복수 정답: ②④]",c:["분류 속성에 따라 엔터티의 정보가 차별화 되는 경우","소수의 선택 속성과 다수의 필수 속성이 존재하는 경우","서브타입으로 분할함으로써 관계가 필수관계로 변하는 경우","복잡한 엔터티의 단순화가 필요한 경우"],a:1,ex:"②소수의 선택 속성이 존재한다면 굳이 서브타입으로 구분할 필요 없음. ④엔터티 단순화와는 거리가 멀다."},
{n:176,q:"[부서]—(소속부서)—<[사원]—(접수사원)—<[주문] 모델에서 부서와 주문 사이에도 관계가 있을 때 발생할 수 있는 문제점은?",c:["관계의 중복은 중복 데이터를 도입하게 되며 결국 데이터베이스 일관성에 문제를 일으킬 수 있다.","주문 실체 유형에 '접수부서'와 '접수사원'을 관리해야 하므로 아무런 문제가 없다.","'사원'의 소속이 바뀌면 주문 당시의 '주문접수부서'를 알 수 없으므로 '주문'과 '부서' 사이에 관계를 가지고 가는 것은 논리적으로 문제가 없다.","'부서'와 '주문'의 JOIN 시에 Access Path를 신속하게 하기 위하여 '주문'이 '부서'와 관계를 가지는 것은 합당하다."],a:0,ex:"사원은 부서에 종속되어 있으므로 사원의 부서를 알면 접수부서를 알 수 있음. 관계 중복은 중복 데이터를 도입하여 데이터 일관성 문제 야기."},
{n:177,q:"엔터티의 통합과 분할에 대한 설명으로 적합한 것은?",c:["엔터티는 통합 할수록 집합의 유연성은 향상되지만 독립성은 저하된다.","집합의 일부가 서로 겹칠 때 어느 한 집합을 확장하여 나머지를 포함시키는 것은 부분형태의 통합 방법이다.","키 엔터티를 최대한 통합을 하는 것은 향후에 생길 자식 엔터티를 위해서 가능하면 해야 한다.","집합의 동질성 부여 방법에 따라 집합의 독립성에 영향을 주지는 못한다."],a:0,ex:"엔터티 통합은 향후 유연성이 크게 향상되나 무리한 통합은 집합의 독립성을 저해함."},
{n:178,q:"관계(Relationship)에 대한 설명으로 틀린 것은?",c:["집합 간에는 하나 이상의 많은 관계들이 존재할 수 있다.","다대다(M:M) 관계는 복잡성을 증가시키므로 발견 즉시 두개의 일대다(1:M) 관계를 가지는 관계 엔터티로 분해하는 것이 바람직하다.","관계의 내용에 따라서 얼마든지 관계의 형태가 달라질 수 있다.","관계를 맺는 두 엔터티의 의미상 식별자가 결정되지 않았다면 관계를 생성하는 것은 무의미하다고 볼 수 있다."],a:1,ex:"다대다(M:M) 관계는 개념 데이터 모델링 단계에서 해소하지 않고 논리 데이터 모델링의 마지막 부분에서 해소하는 것이 바람직."},
{n:179,q:"관계(Relationship)에 대한 설명으로 부적합한 것을 모두 고르시오. [복수 정답: ③④]",c:["관계도 집합이다.","집합 간에 존재하는 무수히 많은 관계 중에 직접종속인 것만을 관계로 모델링한다.","다대다(M:M) 관계는 복잡성을 증가시키므로, 발견 즉시 두 개의 일대다(1:M) 관계를 갖는 관계 엔터티로 분해한다.","두 엔터티 간에 하나 이상의 관계를 정의하는 것은 바람직하지 않다."],a:2,ex:"③M:M 관계는 발견 즉시 해소가 아닌 논리 모델링 마지막 단계에서 해소. ④두 엔터티 간에 하나 이상의 관계가 얼마든지 존재할 수 있음."},
{n:180,q:"각 엔터티 후보들에 대한 모델러의 판단으로 가장 부적절한 것은? [금융기관/피보험자/법인/배송처]",c:["'금융기관'은 '금융'이라는 행위와 기관이라는 개체가 묶여진 관계(Relationship)이다.","'피보험자'는 '피보험'이라는 행위와 '자'라는 개체가 묶여서 만들어진 관계이다.","'법인'은 '고객'의 서브타입에 해당하므로 독자적인 엔터티가 아니다.","'배송처'는 배송이라는 행위와 '처'라는 개체 집합으로 결합된 형태이기 때문에 관계라고 할 수 있지만 경우에 따라서는 엔터티로 볼 수도 있다."],a:0,ex:"'금융기관'은 관계라고 보기 어려움. '금융'은 '기관'이라는 큰 집합의 특정 부분집합을 나타내기 위해 사용된 말."},
{n:181,q:"논리 데이터 모델링에 대한 설명으로 가장 부적합한 것은?",c:["논리 데이터 모델은 논리적 관점에서 데이터 모델링이 최종적으로 완료된 상태를 말한다.","전산화 대상 시스템의 형태나 목적 등에 의해 영향을 받는다.","비즈니스 데이터에 존재하는 사실을 인식·기록하는 기법이다.","데이터 모델링 과정에서 가장 핵심이 되는 부분으로 분석 초기 단계에서부터 설계의 전 과정을 지원하는 '과정의 도구'이다."],a:1,ex:"전산화 대상 시스템의 형태, 목적 등에 의해 영향을 받는 것은 물리 데이터 모델."},
{n:182,q:"아래 표가 필요한 정규화로 적합한 것은? (주문번호가 식별자, 공급자명과 공급자주소가 공급자코드에 종속)",c:["제1차 정규화","제2차 정규화","제3차 정규화","제4차 정규화"],a:2,ex:"식별자는 주문번호이고, '공급자명'·'공급자주소'는 식별자가 아닌 '공급자코드'에 종속된 속성 → 3차 정규화 필요."},
{n:183,q:"논리적 데이터모델링의 목적 및 효과로서 부적절한 것은?",c:["해당 비즈니스에 대해 데이터 관점에서 명확한 이해가 가능하다.","데이터베이스를 구성하는 오브젝트(Object)들의 설계 전략이 반영되어 있다.","사용자와 명확한 의사소통을 하기 위한 수단으로 활용된다.","데이터의 일관성 및 정확성 유지를 위한 규칙을 도출할 수 있다."],a:1,ex:"DB 오브젝트들의 설계 전략은 물리 데이터 모델링 단계에서 생성됨."},
{n:184,q:"엔터티의 통합과 분할에 대한 설명으로 적합한 것은?",c:["핵심 엔터티 즉, 상위 엔터티를 최대한 통합하는 것은 향후에 생길 하위 엔터티를 위해서 가급적이면 삼가해야 한다.","보험회사의 경우에는 '대리점'이 '내근사원'과 통합하는 것이 좋지만, 통신회사인 경우에는 '조직'과 통합하는 것이 바람직하다.","집합의 일부가 서로 겹칠 때는 어느 한 집합을 확장하여 나머지를 포함하는 것이 부분형태의 통합 방법일 수 있다.","이러한 유연성 확보를 위해서 집합을 최대한 분할하는 것이 바람직하다."],a:1,ex:"하위 엔터티를 위해서는 최대한 통합을 유도하는 것이 바람직. 새로운 유형 추가 시 서브타입만 증가하는 형태가 바람직."},
{n:185,q:"논리 데이터 모델링의 필수 성공 요소들에 대한 설명으로 부적절한 것을 모두 고르시오. [복수 정답: ①④]",c:["현업 사용자보다 업무시스템 운영 경험이 많은 유지보수 담당자의 참여가 필수적이다.","절차(Procedure)보다는 데이터에 초점을 두고 모델링을 진행해야 한다.","데이터의 구조(Structure)와 무결성(Integrity)을 함께 고려해야 한다.","변경이 발생할 가능성은 매우 높으면서 이력관리 대상 속성이 적으면 속성 레벨의 선분이력 관리 방식이 유리하다."],a:0,ex:"①데이터 모델링 과정에는 현업사용자의 참여가 필수적. ④변경 발생 가능성 높고 이력 대상 속성이 적으면 속성 레벨 이력 관리가 유리."},
{n:186,q:"엔터티 후보의 분류를 위한 모델러의 수행내용으로 가장 부적합한 것은?",c:["우선순위가 높은 엔터티들은 대개 전체 데이터 모델링의 골격에 해당하는 주요 엔터티들이기 때문에 먼저 이들을 명확하게 함으로써 모델링의 골격을 갖출 수 있다.","데이터 모델링의 골격에 해당하는 엔터티는 각 회사마다 가장 중요한 데이터의 집합인데 비즈니스 영역마다 유사한 형태를 가지고 있는 것이 보통이다.","최상위 우선순위를 가지는 엔터티들은 대개 행위를 발생시키는 주체나 목적에 해당한다.","카드사에서 '신용카드'라는 엔터티 후보는 최상위 우선순위를 가지고 있으므로 가장 먼저 정의해야 할 중요한 엔터티이다."],a:3,ex:"신용카드는 카드를 발급 받은 사람과 카드사의 상품이 반드시 존재해야만 태어날 수 있는 엔터티. 따라서 우선순위가 가장 높다고 보기 어려움."},
{n:187,q:"속성 정의에 대한 설명으로 틀린 것은?",c:["엔터티에 통합되는 구체적인 정보항목으로써 더이상 분리될 수 없는 최소의 데이터 보관 단위이다.","관계(Relationship)도 속성이다.","속성들은 서로 독립적이고 식별자에만 종속되어야 한다.","현재 시스템과 다른 시스템의 다큐먼트는 속성 후보 수집처로 적절하지 못하다."],a:3,ex:"다른 시스템의 문서를 참조하는 것은 현재 시스템의 개선점 파악 및 미처 생각하지 못했던 관리 속성 추출에 중요한 소스로 사용 가능."},
{n:188,q:"참조 무결성 규칙에 대한 설명으로 틀린 것은? (주문과 주문내역은 1:M의 양쪽 필수 관계)",c:["주문 인스턴스(Row) 삭제 시에는 주문내역 인스턴스(Row)를 삭제한다.","주문 인스턴스(Row) 삭제 시에는 주문내역 인스턴스(Row)가 있으면 삭제하지 않는다.","주문내역 인스턴스(Row) 입력 시에는 주문 인스턴스(Row)가 있는 경우만 입력한다.","주문내역의 마지막 인스턴스(Row) 삭제 시에는 주문 인스턴스(Row)도 삭제한다."],a:3,ex:"④번은 참조 무결성이 해결하지 못하는 연쇄작용에 의한 데이터 무결성."},
{n:189,q:"논리 데이터 모델링 과정에서 속성 후보를 수집하기 위한 자료로 가장 부적절한 것은?",c:["중장기 마스터플랜","현업장표/보고서","사용자 인터뷰","타 시스템 자료"],a:0,ex:"속성은 엔터티 내에서 관리해야 할 구체적인 관리항목. 중장기 마스터플랜에서 속성 후보를 도출한다고 보기 어려움."},
{n:190,q:"일대일(1:1) 관계의 선택사항에 대한 설명으로 올바른 것은?",c:["필수-선택형태(——·)는 좌측 엔터티가 우측 엔터티에 집합적으로 포함되는 형태를 말한다.","필수-필수형태(——)가 데이터 모델에 많이 등장하였다면, 모델링 과정 중에서 과도한 수평분할을 시도하였기 때문이다.","선택-선택형태(·——·)는 데이터 모델링 과정에서 드물게 발생하는 형태이다.","일대일(1:1) 형태의 데이터 모델은 최대한 일대다(1:M) 관계의 데이터 모델로 유도하는 것이 바람직하다."],a:1,ex:"필수-필수 일대일(1:1) 관계는 과도한 수직 분할을 시도하였을 경우에 많이 나타나는 형태."},
{n:191,q:"속성 검증의 방법으로 가장 부적절한 것은?",c:["최소 단위 분할 여부를 판단한다.","해당 속성 후보가 단일값을 갖는지 판단한다.","추출 속성인지 판단한다.","식별자로 사용되는 것인지 판단한다."],a:3,ex:"식별자 검증은 속성 검증이 완료되고 해당 엔터티 내에서 식별자를 지정하게 됨. 속성 검증과는 거리가 멀다."},
{n:192,q:"실체 유형에 대한 정의(설명)를 기술할 때 고려해야 할 사항으로 가장 거리가 먼 것은?",c:["실체 유형의 정의는 그 실체 유형이 무엇인지를 설명해야 한다.","실체 유형의 정의는 왜 그 실체 유형이 업무에서 중요한가를 설명해야 한다.","실체 유형의 정의는 누가, 어떻게 실체 유형을 사용하는지를 설명해야 한다.","실체 유형의 정의는 실체 유형명은 명확하고 간결하게 설명해야 한다."],a:2,ex:"③번은 변화 가능성이 많으므로 데이터 모델에 정의하면 유지보수에 문제가 발생. 매트릭스 분석 기법을 통한 상호작용 분석으로 수행하는 것이 좋음."},
{n:193,q:"'일자, 시간, 성명, 주민등록번호, 우편번호 등은 일반적으로 나누지 않는 것이 좋다'는 유의사항이 속하는 속성 검증의 하위 단계로 적합한 것은?",c:["상세화 여부 판단","최소 단위 분할","추출 속성 검증","단일값"],a:1,ex:"속성은 최소단위로 분할하는 것이 일반적이지만 경우에 따라서는 복합속성을 구성하는 것도 가능 → 최소 단위 분할 단계."},
{n:194,q:"고객 주소 관리 데이터 모델에 대한 설명으로 가장 부적절한 것은?",c:["'법인고객'을 '고객'에서 통합해서 관리하고 있다면, '고객주소이력2'와 같은 형태의 고객주소관리는 비효율적이다.","'고객주소이력1'과 같은 형태에서는 동일한 주소가 여러 번 반복해서 나타나는 경우가 발생할 수 있다.","'고객주소이력2'와 같은 형태의 데이터 모델은 ERP와 같은 패키지 형태에서 자주 등장하며 확장성과 재사용성의 극대화에 초점을 두고 있다.","'고객주소이력1'과 같은 형태에서는 고객이 가진 여러 가지 구분(자택, 직장 등)의 주소이력을 통합하여 관리할 수 있다."],a:0,ex:"'고객주소이력1', '고객주소이력2' 등의 형태와 '법인고객관리'의 형태와는 무관."},
{n:195,q:"'한 개체가 여러 값을 가지거나 반복되는 속성을 가지게 되면 잘못된 속성이다'가 위배하는 정규화 원칙으로 적합한 것은?",c:["1차 정규화","2차 정규화","3차 정규화","4차 정규화"],a:0,ex:"제1 정규화: 하나의 속성은 반복되는 중복값을 가질 수 없음. 중복값을 가지기 위해서는 새로운 엔터티를 생성해야 함."},
{n:196,q:"순환관계 데이터 모델에 대한 설명으로 가장 부적절한 것은?",c:["순환관계 모델은 새로운 계층의 추가·수정에 대해서 유연하게 대처할 수 있다.","순환관계 모델에서 최상위는 의미적으로 NULL이지만 물리적인 요소를 고려해서 특정 값을 갖는 것이 바람직하다.","다대다(M:M) 순환관계를 처리하기 위해서는 별도의 엔터티를 추가하여야 한다.","순환관계 모델에서 구조가 변경되면 식별자가 변해야 하기 때문에 과거의 데이터에 대해서 수정작업을 수행해야 한다."],a:3,ex:"구조가 변경되더라도 식별자는 변경되지 않기 때문에 과거 데이터를 변경할 필요가 없음."},
{n:197,q:"'고객' 엔터티의 속성을 정의할 때, 추출 속성(Derived Attribute)값으로 가장 거리가 먼 것은?",c:["현주소","최초가입일","고객활동상태","결혼기념일"],a:3,ex:"'결혼기념일'은 고객 엔터티의 추출 속성이 아니라 본래의 속성으로 보는 것이 적절."},
{n:198,q:"구매의뢰 엔터티에서 의미상 식별자의 역할을 하는 속성으로 적합한 것은? [구매의뢰: #구매의뢰번호, 자재코드/의뢰부서/의뢰일자/승인수량/발주부서/의뢰수량/용도/의뢰처/발주처/진행상태]",c:["구매의뢰번호","자재코드, 의뢰일자","구매의뢰번호, 자재코드, 의뢰일자","자재코드, 의뢰부서, 의뢰일자"],a:3,ex:"의미상으로 식별자의 역할을 하는 속성 = 누가·무엇을·언제·어디서 등 육하원칙에 해당하는 속성 그룹. 자재코드·의뢰부서·의뢰일자."},
{n:199,q:"속성 정의 시에 유의사항으로 부적절한 것을 모두 고르시오. [복수 정답: ②③]",c:["의미가 명확한 속성 명칭을 부여한다.","'전화번호'라는 속성은 일반적으로 많이 사용되는 용어로써 속성명으로 적합하다.","'순번', '상태' 등과 같이 유일한 복합명사를 사용한다.","단수형으로 속성명을 사용한다."],a:1,ex:"②전화번호가 어떤 전화번호인지 명확하게 정의되는 것이 바람직. ③순번·상태 등과 같이 주어 부분이 빠진 형태의 용어는 속성으로 바람직하지 않음."},
{n:200,q:"엔터티 후보 선정시 유의사항으로 가장 적절한 것은?",c:["중요한 엔터티인 경우 가능한 값이 분석하는 것이 좋다.","단어 하나하나에 집중하지 않고 전체 집합을 고려하여 집합을 개념적으로 정의하는 것이 좋다.","데이터는 프로세스와 밀접하게 관련있기 때문에 엔터티 후보 선정 시 프로세스 파악은 중요하다.","이음동의어, 동음이의어등과 같이 동의어처럼 보이는 집합도 집합을 명확하게 구분하여 파악하는 것이 중요하다."],a:3,ex:"① 너무 깊지 않게. ② 단어 하나하나에 집중. ③ 프로세스에 연연하지 말아야. ④ 이음동의어·동음이의어를 명확하게 구분하는 것이 중요."},
{n:201,q:"'고객' 엔터티의 식별자를 결정하기 위한 기준에 대한 설명으로 가장 부적절한 것은?",c:["각 인스턴스들을 유일하게 식별할 수 있어야 한다.","나머지 속성들을 직접 식별할 수 있어야 한다.","후보 식별자로 속성 집합을 선택하는 경우에는 개념적으로 유일해야 한다.","후보 식별자는 단일 속성이어야 한다."],a:3,ex:"여러 개의 속성들을 묶어서 식별자로 생성할 수 있음. 단일 속성이어야 한다는 것은 틀린 설명."},
{n:202,q:"데이터 모델링에서 이력 관리의 대상과 가장 거리가 먼 것은?",c:["부서와 사원의 관계","주문과 주문품목의 관계","상품 단가에 대한 관리","금융 상품의 이자율 관리"],a:1,ex:"세월이 흐르면 사원의 부서, 상품의 단가, 금융상품의 이자율이 바뀔 수 있음. 주문과 주문품목의 관계는 이력 관리 대상과 거리가 멀다."},
{n:203,q:"인조 식별자 지정에 대한 설명으로 부적절한 것은?",c:["최대한 범용적인 값을 사용한다.","유일한 값을 만들기 위해 인조 식별자를 사용한다.","편의성·단순성 확보를 위해 인조 식별자를 사용할 수 있다.","내부적으로 사용되는 인조식별자는 가급적 피한다."],a:3,ex:"경우에 따라서는 내부적으로만 사용되는 인조 식별자를 사용할 수도 있음. 특히, 시스템에서 사용하는 데이터들에 이런 유형의 식별자가 많이 존재."},
{n:204,q:"Richard Barker의 CASE*Method 방식과 정보공학 방식이 잘못 짝지어진 것은?",c:["Barker: [A] —·——< [B] / 정보공학: [A] >——·——< [B]","Barker: [A] —·——< [B] / 정보공학: [A] |——·——○< [B]","Barker: [A] —·—— [B] / 정보공학: [A] ○——·——< [B]","Barker: [A] —·—— [B] / 정보공학: [A] ○——·——○< [B]"],a:0,ex:"정보공학방법에서 동그라미가 없는 것은 필수 관계를 말하고, CASE*Method에서는 실선이 필수 관계를 표현."},
{n:205,q:"식별자 확정 시에 고려사항으로 가장 부적절한 것은?",c:["상위 엔터티로부터 하위 엔터티로 결정해가는 것이 좋다.","메인 엔터티는 하위 엔터티들에 대한 영향이 크기 때문에 식별자 속성의 갯수를 적게 하는 것이 좋다.","인조 식별자는 유일성 확보에 유리하므로 적극적인 사용을 고려한다.","인조 식별자의 사용은 꼭 필요한 경우에만 한정적으로 사용하는 것이 바람직하다."],a:2,ex:"인조 식별자는 꼭 필요한 경우에만 한정적으로 사용하는 것이 바람직. 하위 엔터티는 자식 엔터티를 가질 가능성이 적으므로 정보의 단절과는 거리가 멀다."},
{n:206,q:"한 개체가 여러 값을 가지거나 반복되는 속성이 발견되었을 때, 모델러가 제일 먼저 취해야 할 행동으로 가장 적절한 것은?",c:["해당 속성은 잘못된 속성으로 간주하여 배제시킨다.","반복되는 형태에 대해 정확히 파악하기 위해서 해당 속성의 생성 규칙 내용을 업무 담당자와 협의하여 그 결정에 따라 판단한다.","이 부분은 정규화 과정에서 진행된다고 가정하여 우선순위를 뒤로 미룬다.","해당 엔터티의 UID에 대한 적절성 여부를 판단한다."],a:1,ex:"②와 같은 상황에서 가장 먼저 해야 할 일은 해당 반복 속성의 내용을 업무담당자를 통하여 정확히 파악하는 것."},
{n:207,q:"논리 데이터 모델링의 정규화 작업의 내용으로 올바른 것은?",c:["1차 정규형: 모든 속성은 식별자 전체에 종속되어야 한다.","2차 정규형: 반복 속성은 존재할 수 없다.","3차 정규형: 2차 정규형을 만족하고, 비식별자 속성 간에 종속이 없어야 한다.","인조 식별자의 사용은 데이터 일관성, 무결성 확보에 유리하므로 정규화를 생략할 수 있다."],a:2,ex:"1차 정규형: 반복 속성 없음. 2차 정규형: 모든 속성은 식별자 전체에 종속. 3차 정규형: 2차 만족하고 비식별자 속성 간 종속 없음."},
{n:208,q:"선분(기간)이력으로 관리해야 하는 것으로 가장 거리가 먼 것은?",c:["각 상품별 이자율에 대한 이력 관리","매일 바뀌는 환율에 대한 이력 관리","어느 부서에 어떤 사원이 근무했다는 이력 관리","제조 기업의 상품 단가에 대한 이력 관리"],a:1,ex:"매일매일이므로 일자별로 관리하면 굳이 기간으로 관리할 필요가 없음. 환율은 시점이력이 적합."},
{n:209,q:"정규화 작업을 수행함으로써 얻을 수 있는 장점으로 가장 거리가 먼 것은?",c:["중복값 및 Null 값이 줄어든다.","데이터 구조의 안정성이 향상된다.","복잡한 코드로 데이터 모델을 보완할 필요가 없어진다.","새로운 요구 사항의 도출을 차단하여 개발의 안정성을 확보할 수 있다."],a:3,ex:"새로운 추가 요구 사항의 반영은 프로젝트 관리 측면에서 다루어져야 할 부분. 정규화 장점과 거리가 멀다."},
{n:210,q:"선분(기간)이력관리에 대한 설명으로 가장 부적절한 것은?",c:["선분(기간)이 중첩되지 않도록 해야 한다.","시작일자와 종료일자로 관리할 때 종료일자에 '99991231'을 초기(Default)값으로 설정하는 것은 성능상의 이유다.","데이터의 유효기간을 관리하는 형태로 특정 시점의 데이터를 조회할 때 유리하다.","종료일자는 어떤 면에서 데이터 중복이므로 데이터 무결성을 위하여 가급적 선분이력은 사용하지 않는다."],a:3,ex:"①번과 같이 조치를 취한다면 데이터 무결성을 깨지 않으므로 사용하지 않는 것보다 유리할 수 있음."},
{n:211,q:"다대다(M:M) 관계에 대한 설명으로 부적절한 것을 모두 고르시오. [복수 정답: ③④]",c:["논리 데이터 모델링 과정 중에서 흔히 나타난다.","실세계의 업무 중 대부분은 다대다(M:M) 관계라고 할 수 있다.","다대다(M:M) 관계는 발생 즉시 해소되어야 데이터 모델의 품질이 향상된다.","다대다(M:M) 관계가 해소되면 두 개의 일대다(1:M) 관계로 변환되고 새로운 엔터티의 추가는 필요없다."],a:2,ex:"③M:M 관계는 개념 모델에서 해소하지 않고 논리 모델 마지막 단계에서 해소하는 것이 바람직. ④M:M 해소 시 두 개의 1:M 관계를 가지는 새로운 엔터티가 생성됨."},
{n:212,q:"속성 정의에 대한 설명으로 부적합한 것은?",c:["속성은 엔터티에 통합되는 구체적인 정보항목으로써 더 이상 분리될 수 없는 최소의 데이터 보관 단위이다.","속성에는 결국 데이터 값이 들어가게 되며, 그 값들은 여러 종류를 가지게 된다. 이런 측면에서 본다면 속성 또한 집합이라고 볼 수 있다.","속성들 간에는 서로 독립적이고, 식별자에만 종속되어야 한다.","현재 시스템의 유지보수를 게을리하여 파생된 시스템 다큐먼트(Document)는 속성후보의 수집처로 적절하지 못하다."],a:3,ex:"다른 시스템의 문서를 참조하는 것은 현재 시스템의 개선점 파악 및 미처 생각하지 못했던 관리 속성 추출에 중요한 소스."},
{n:213,q:"참조 무결성 규칙에 대한 설명으로 부적절한 것을 모두 고르시오. [정답: ④]",c:["관계 테이블의 모든 외부 식별자 값은 관련 있는 관계 테이블의 모든 주 식별자 값이 존재해야 한다.","데이터베이스 설계 관점이 아닌 사용자의 업무 규칙에 따라 적절한 규칙을 선택한다.","입력 규칙은 자식 실체에 인스턴스를 입력할 때, 참조 무결성 규칙으로 Dependent, Automatic, Nullify, Default 등이 해당된다.","삭제 규칙은 자식 실체의 인스턴스를 삭제할 때 사용되어지는 참조 무결성 규칙으로 Restrict, Cascade, Nullify, Default 등이 해당된다."],a:3,ex:"삭제 규칙은 부모 실체의 인스턴스를 삭제할 때 사용되는 참조 무결성 규칙. '자식 실체'가 아님."},
{n:214,q:"비정규형 릴레이션이 여러 개의 복합적인 의미를 가지고 있는 속성이 분해되어 하나의 의미만을 표현하는 속성들로 분해되어야 한다는 내용이 설명하고 있는 정규화의 유형으로 적합한 것은?",c:["제1 정규형","제2 정규형","제3 정규형","BCNF 정규형"],a:0,ex:"①번은 제1 정규형에 대한 설명."},
{n:215,q:"이력관리 형태에 대한 설명으로 가장 부적절한 것은?",c:["이력관리 형태는 시점이력관리와 선분이력관리로 구분할 수 있다.","시점이력관리는 변경 시점의 스냅샷을 관리하는 형태로 특정 시점의 데이터를 추출할 때 불필요한 작업을 수행하게 되는 단점을 갖고 있다.","선분이력 관리는 데이터의 유효기간을 관리하는 형태로 특정 시점의 데이터를 추출할 때 유리하다.","변경이 발생할 가능성은 매우 높으면서 이력관리 대상 속성이 적으면 속성 레벨의 선분이력 관리 방식이 유리하다."],a:3,ex:"변경이 가끔 발생하고 이력 대상 속성이 많다면 인스턴스 레벨의 이력관리를 고려할 수 있음."},
{n:216,q:"아래의 데이터 모델에서 제3 정규형을 위배하고 있지 않은 속성으로 적합한 것은?",c:["강좌.과명","수강등록.교수번호","강좌.강좌명","학생1.수강등록일자"],a:2,ex:"③강좌.강좌명은 제3 정규형 위배 없음. ①강좌.과명은 3정규형 위배. ②수강등록.교수번호는 2정규형 위배. ④학생1.수강등록일자는 1정규형 위배."},
{n:217,q:"선분이력관리에서 종료점 처리의 방법을 결정하는 고려사항으로 가장 적절한 것은?",c:["종료점에 해당하는 속성은 NULL 허용여부와 상관없이 인덱스 정의가 가능하므로 수행도를 보장 받을 수 있다.","계속 진행 중인 것으로 간주해 최대치를 부여하면 여러모로 효율이다.(일자:99991231)","종료점에 대한 최대치 부여는 해당 애플리케이션에서 Validation Check로 처리하면 DBMS에 부담을 털어 주어 훨씬 효과적이다.","DBMS 종류나 버전에 따라 NULL 검색도 인덱스를 사용할 수 있어서 Null 허용은 문제되지 않는다."],a:1,ex:"선분이력에서 최종 데이터(계속 진행 중)에 대해서는 '99991231'과 같은 수렴값을 지정하여 사용하는 것이 여러 측면에서 바람직."},
{n:218,q:"관계 연산자에 대한 내용으로 부적절한 것은?",c:["Select (or Restrict): 열(Column)을 기준으로한 행(Row)의 Subset","Join: 열(Column)을 기준으로한 각 행(Row)을 수평적으로 묶음","Difference: 다른 관계 테이블의 모든 행에 대응하는 열을 제외한 열","Union: 중복제거를 기준으로 각 행(Row)을 수직적으로 묶음"],a:2,ex:"③ Difference는 차집합(Minus). '다른 관계 테이블의 모든 행에 대응하는 열을 제외한 열'은 Division에 대한 설명."},
{n:219,q:"다대일(M:1) 관계에 대한 설명으로 가장 적절한 것은?",c:["가장 흔하게 나타나는 관계 형태이다.","양쪽 모두가 선택적(Optional)인 것이 기본형이다.","다대다(M:M) 관계는 '아직 덜 풀려진 형태'로 해석될 수 있으며 현실에서 드물게 발생한다.","일대다(1:M) 관계 중 양측 필수관계인 경우는 현실 세계에서 가장 흔하게 발생하는 경우이다."],a:0,ex:"M쪽이 Mandatory인 경우가 가장 많은 경우. 현실에서 가장 많이 존재하는 형태의 관계. 양측 필수 관계는 현실에는 존재하기 힘든 관계."},
{n:220,q:"아래의 고객3·이벤트·이벤트참여내역 모델에서 제3정규형을 위배하고 있는 속성으로 적합한 것은?",c:["연락전화번호","고객직업코드","참여구분명","참여원번호"],a:2,ex:"UID를 제외한 속성 간의 종속관계를 가져서는 안 됨. '참여구분코드', '참여구분명' 등이 제3정규형을 위배."},
{n:221,q:"'물리 데이터 모델'에 대한 정의로 가장 부적절한 것은?",c:["논리 데이터 모델을 특정 데이터베이스로 설계함으로써 생성된 데이터를 저장할 수 있는 물리적인 스키마를 말한다.","논리 데이터 모델의 엔터티는 하나의 테이블로 확정되어 진다.","하나의 논리 데이터 모델은 여러 개의 물리 데이터 모델로 설계되어 질 수 있다.","논리 데이터 모델의 일부 속성만으로 물리 데이터 모델에서 테이블로 설계하는 경우도 발생할 수 있다."],a:1,ex:"하나의 엔터티는 물리적 요소들을 감안하여 경우에 따라서는 여러 개의 테이블로 생성될 수 있음."},
{n:222,q:"선분이력의 특징으로 틀린 것은?",c:["과거 임의 시점의 이력 데이터를 Access하기 위해서는 '원하는 시점' between 시작일자 and 종료일자 형태의 쿼리를 사용한다.","개체의 상태가 지속된 유효기간을 관리하는 방식이다.","종료 시점이 아직 결정되지 않아서 현재 진행 중인 이력 데이터에 대한 종료값은 Null을 지정하는 것이 효율적이다.","시점별로 환율의 변화를 관리해야 한다면 선분이력으로 관리하는 것이 바람직하다."],a:2,ex:"현재 진행 중인 건은 의미적으로는 종료점을 Null로 표현하는 것이 맞지만 실제적으로는 수렴값(99991231)을 지정하는 것이 보다 효율적."},
{n:223,q:"하나의 논리 데이터 모델을 가지고 여러 개의 물리 데이터 모델을 생성하는 이유로 가장 거리가 먼 것은?",c:["분산 데이터베이스 구축 시에 동일한 물리 데이터 모델을 여러 개 생성한다.","조금씩 상이한 물리 데이터 모델을 생성하여 여러 형태의 물리 데이터 모델을 비교하고 싶을 때 생성한다.","논리 데이터 모델은 변화하지 않았지만 물리적 환경의 변화 발생 시에 여러 개의 물리 데이터 모델을 생성한다.","사용자의 요구가 명확하지 않을 때 여러 개의 물리 데이터 모델을 생성한다."],a:3,ex:"사용자의 요구 사항이 명확하지 않았다면 논리 데이터 모델 자체가 확정되지 않은 상황. 이것은 물리 데이터 모델이 여러 개로 생기는 상황과는 거리가 멀다."},
{n:224,q:"일반적인 데이터 모델에서 이력을 관리하는 모델로 변환 시에 나타나는 상황에 대한 설명으로 틀린 것은?",c:["이력 관리는 관계의 형태를 변화시킨다. 즉, 속성이나 관계의 Cardinality를 증가시키게 된다.","하나의 엔터티에 일반 속성 이력을 관리하면 일대다(1:M) 관계의 하위 엔터티를 생성하게 된다.","다대다(M:M) 관계인 상태에서 해당 관계에 대한 이력을 관리하면 기존의 관계 엔터티에 추가적인 식별자 속성을 발생시키게 된다.","일대다(1:M) 관계에 대한 이력을 관리하면 M쪽 엔터티에 속성을 추가하여 관리하게 된다."],a:3,ex:"일대다(1:M) 관계의 이력을 관리하게 된다면 다대다(M:M) 관계로 변하게 되어 새로운 관계 엔터티를 생성해야 함."},
{n:225,q:"물리 데이터 모델 설계에 영향을 미치는 요소로 가장 부적절한 것은?",c:["CPU, MEMORY, DISK 등 하드웨어 자원의 상황","운영체제 및 DBMS 버전","DBMS 파라미터 정보","개발자 기술 수준"],a:3,ex:"개발자의 기술 수준은 물리 데이터 모델 설계에 가장 영향을 미치는 요소로 보기 힘들다."},
{n:226,q:"논리 데이터 모델의 관계변환에 대한 설명으로 가장 부적절한 것은?",c:["일대다(1:M) 관계는 논리 데이터 모델에서 가장 흔한 관계의 형태이고, M쪽 관계의 형태에 따라서 해당 칼럼의 선택사항이 결정된다.","일대일(1:1) 관계에 의해서 생긴 모든 외래키는 Unique Constraints를 정의할 수 있다.","선분이력을 관리하는 상위 엔터티와 관계에서는 식별자 상속을 시키지 않을 수도 있다.","일대일(1:1) 관계에서는 양쪽 집합의 선택사양에 따라서 외래키의 생성 위치가 달라질 수 있다. 즉, Optional 관계를 가진 쪽 집합에서 외래키를 생성하는 것이 유리하다."],a:3,ex:"일대일(1:1) 관계에서는 Mandatory 관계를 가진 쪽에 외래키를 생성하는 것이 바람직."},
{n:227,q:"논리 데이터 모델을 물리 데이터 모델로 변환할 때 잘못 짝지어진 것은?",c:["Entity - Table","Attribute - Column","Primary UID - Primary Key","Business Rule - Index"],a:3,ex:"논리 데이터 모델에서 Business Rule은 물리 데이터 모델에서 Constraint의 형태로 설계. 특히 Check Constraint의 형태가 가장 보편적."},
{n:228,q:"A기업에서 물리 데이터 모델링 진행 시 '통화내역' 테이블의 파티셔닝을 고려할 때 모델러가 가장 먼저 파악해야 하는 것은?",c:["CPU, MEMORY, DISK 등의 하드웨어 자원 정보","운영체계 및 DBMS의 버전 정보","DBMS의 파라미터 정보","백업·복구 기법 및 정책, 보안관리 정책 등의 데이터베이스 운영 관리요소 정보"],a:1,ex:"DBMS 벤더와 버전에 따라서 지원하는 파티셔닝의 기법들이 상이. 따라서 상이한 점들을 파악하는 것이 우선되어야 함."},
{n:229,q:"논리 데이터 모델의 서브타입 엔터티를 물리적인 객체로 생성하는 방법으로 가장 부적절한 것은?",c:["하나의 테이블로 통합하여 '고객' 테이블을 생성한다.","여러 개의 테이블로 분할하여 '개인' 테이블과 '법인' 테이블을 생성한다.","수퍼타입과 서브타입을 각각의 테이블로 변환하여 세개의 테이블로 생성한다.","'법인' 내의 또 다른 서브타입인 '법인사업자'와 '개인사업자'를 별개의 테이블로 생성한다."],a:3,ex:"'법인' 테이블을 '법인사업자', '개인사업자'로 분류하여 별개의 테이블로 생성하는 것은 바람직하지 않음. 이렇게 상위 테이블을 분할하면 하위 테이블들을 활용하는데 많은 불필요한 일이 발생."},
{n:230,q:"선분이력 모델에서 현재를 주로 읽는 경우 PK 인덱스의 칼럼 순서로 가장 적합한 것은? [고객직장이력: #고객번호(FK), #시작일자, #종료일자, ...]",c:["고객번호 + 시작일자 + 종료일자","시작일자 + 종료일자 + 고객번호","고객번호 + 종료일자 + 시작일자","종료일자 + 시작일자 + 고객번호"],a:2,ex:"대부분은 현재를 읽는다면 '고객번호 + 종료일자 + 시작일자'가 가장 효율적."},
{n:231,q:"논리 데이터 모델의 서브타입 엔터티를 물리적인 테이블로 변환하는 방법에 대한 설명으로 가장 부적절한 것은?",c:["서브타입을 하나의 테이블로 통합하는 경우에는 주로 서브타입이 적은 양의 속성이나 관계를 가진 경우에 적용한다.","서브타입을 하나의 테이블로 통합하면 데이터 액세스가 보다 간편해지고, 복잡한 처리를 하나의 SQL로 통합하기가 용이해져서 수행속도가 향상될 수 있다.","서브타입을 여러 개의 테이블로 분할하는 경우에는 주로 서브타입이 많은 양의 속성이나 관계를 가진 경우에 적용한다.","서브타입을 여러 개의 테이블로 분할하면 각 서브타입 속성들의 선택사양을 명확히 할 수 있으나, 처리 할 때 마다 서브타입의 유형구분이 필요하다."],a:3,ex:"여러 개의 테이블로 분할하면 유형구분이 필요가 없어짐. 서브타입 유형구분별로 별개의 테이블로 생성되기 때문."},
{n:232,q:"반정규화의 한 방법으로 테이블이나 칼럼에 대한 중복을 수행하고자 할 때, 고려 및 권고사항으로 부적절한 것을 모두 고르시오. [정답: ②]",c:["넓은 범위를 자주 처리함으로써 수행속도의 저하가 우려되는 경우에는 집계 테이블의 추가를 고려해 볼 수 있다.","자주 사용하는 엑세스 조건이 다른 테이블에 분산되어 있어 엑세스 범위를 줄이지 못하는 경우에는 진행 테이블의 추가를 검토하는 것이 바람직하다.","빈번하게 조인을 일으키는 칼럼에 대해서는 중복칼럼의 생성을 고려한다.","계산하는데 비용이 많이 발생하고 빈번하다면 계산 값을 중복시켜서 가져갈 수 있다."],a:1,ex:"②의 상황에서는 진행 테이블 추가가 아닌, 자주 사용되는 조건들을 하나의 테이블로 모아서(칼럼 중복·추출 속성) 조건의 변별성을 극대화해야 함."},
{n:233,q:"논리 데이터 모델에서 관계를 물리 데이터 모델의 객체로 변환하는 방법에 대한 설명으로 가장 부적절한 것은?",c:["일대다(1:M) 관계는 논리 데이터 모델에 존재하는 가장 흔한 관계의 형태이고, M쪽 관계의 형태에 따라 관계 칼럼의 선택사양을 결정한다.","일대일(1:1) 관계에 의해서 생긴 모든 외래키 부분은 Unique Key가 필수적이다.","일대다(1:M) 순환관계는 데이터의 계층구조를 표현하기 위한 수단으로 사용되며 특성상 1쪽, M쪽 양방향 모두 Optional이다.","일대다(1:M) 관계에서 1쪽이 Mandatory이고 M쪽이 Optional 경우는 이론적으로만 가능할 뿐 현실세계에서 거의 발생하지 않기 때문에 무시할 수 있다."],a:3,ex:"일대다(1:M) 관계에서 1쪽이 Mandatory이고 M쪽이 Optional 경우는 업무 규칙상 발생할 수 있음."},
{n:234,q:"배타적 관계를 물리 데이터 모델로 변환하는 두 방법에 대한 설명으로 가장 부적절한 것은?",c:["외래키 분리 방법에서 가장 큰 단점은 새로운 관계를 추가 할 때 구조가 변경되어야 한다는 것이다.","외래키 분리 방법에서는 논리 데이터 모델의 배타적 관계를 비즈니스 규칙으로 구현하기 위해서 별도의 제약조건을 생성할 필요가 있다.","외래키 결합 방법은 배타적 관계에 참여하는 관계들을 구분하기 위해서 추가적인 칼럼이 필요하다.","외래키 결합 방법에서는 외래키 제약조건을 통하여 참조 무결성을 유지할 수 있다."],a:3,ex:"외래키의 결합에서는 근본적으로 외부키 제약조건을 생성할 수 없기 때문에 User-Defined Trigger 등의 방법을 통하여 해결해야 함."},
{n:235,q:"물리 데이터 모델링 단계에서 데이터 표준 적용 대상의 우선순위로 가장 낮은 것은?",c:["뷰(View)","스토리지 그룹(Storage Group)","테이블스페이스(Table space)","SQL 코멘트"],a:3,ex:"일반적으로 SQL 코멘트에 대한 데이터 표준 방안을 수립하지 않고, 해당 SQL의 유의사항 또는 처리 방법 등에 대한 내용을 자유롭게 기록하는 것이 일반적."},
{n:236,q:"서브타입 A(B, C) → TABLE A로 하나의 테이블로 생성할 때, 관련된 설명으로 틀린 것은?",c:["TABLE A의 데이터를 액세스하고자 할 때 B와 C를 구분해서 액세스하는 것이 불편하다.","B 서브타입에 정의된 Not Null Constraint를 생성하기가 어렵다.","논리 데이터 모델에서 B와 C 서브타입에 정의된 개별 속성들이 많을 경우에 위와 같은 변환이 대부분이다.","경우에 따라서는 인덱스의 크기가 증가할 수 있다."],a:2,ex:"개별 속성들이 많은 경우에는 하나의 테이블로 변환하는 것이 아닌 여러 개로 분할하는 것이 바람직."},
{n:237,q:"논리 데이터 모델의 특정 엔터티를 물리 데이터 모델에서 분할할 때에 대한 설명으로 부적절한 것은?",c:["하나의 테이블의 데이터가 너무 많고, 레코드들 중에서 특정 범위만 주로 액세스 하는 경우가 많다면 수평분할이 적절하다.","수평분할 시에 분할된 각 테이블들을 서로 다른 디스크에 위치시키면 물리적인 디스크 효율성을 극대화할 수 있다.","테이블의 칼럼 수가 너무 많고, 조회 위주의 칼럼과 갱신 위주의 칼럼이 구별될 수 있으면 수직분할이 유리하다.","특정 칼럼의 크기가 아주 큰 경우에는 수평분할이 유리하다."],a:3,ex:"특정 칼럼의 크기가 아주 큰 경우에는 원래의 테이블의 칼럼들과 분리하여 저장하는 수직분할이 유리."},
{n:238,q:"배타적 관계 모델의 사용이 적절한 것은?",c:["두 엔터티가 하나의 엔터티와 각각 배타적 관계","두 엔터티가 하나의 엔터티와 공통 관계","하나의 엔터티가 두 엔터티와 각각 배타적 관계(호 기호 없음)","하나의 엔터티가 여러 엔터티들과 배타적+일반 관계 혼합"],a:3,ex:"①배타적 관계는 항상 Mandatory이거나 Optional이어야 함. ②③배타적 관계는 반드시 하나의 Entity에만 속해야 함."},
{n:239,q:"반정규화의 한 방법으로 테이블이나 칼럼에 대한 중복을 고려할 때에 대한 설명으로 부적절한 것을 모두 고르시오. [정답: ④]",c:["다량의 범위를 자주 처리함으로써 수행속도 저하가 우려되는 경우 집계 테이블 추가를 고려한다.","자주 사용되는 중복 테이블 유형으로는 집계(통계) 테이블과 진행 테이블이 있다.","클러스터링, 결합인덱스, 고수준 SQL 등을 적절히 활용하면 집계테이블 없이도 양호한 수행속도를 얻을 수 있기 때문에 집계테이블 고려 시에 반드시 먼저 고려되어야 한다.","M:M 관계가 포함된 처리의 과정을 추적, 관리하고자 하는 경우에는 다중테이블 클러스터링이나 조인 SQL의 정확한 구사 등으로 해결이 불가능하므로 반드시 진행 테이블 추가가 고려되어야 한다."],a:3,ex:"M:M 관계가 포함된 처리는 다중 테이블 클러스터링이나 적확한 조인 SQL구사 등을 통해 진행 테이블 없이도 양호한 수행속도를 낼 수 있는 경우가 많음."},
{n:240,q:"파일 시스템(File System)과 데이터베이스 시스템(Database System)의 가장 큰 차이점으로 적합한 것은?",c:["데이터(정보) 공유","데이터(정보) 무결성","데이터(정보) 중복","시스템과 관계된 인력 간의 의사소통"],a:0,ex:"파일 시스템은 업무나 부서 중심의 관점이지만 데이터베이스 시스템은 데이터 통합을 통한 데이터 공유의 관점이라는 것이 가장 큰 차이점."},
{n:241,q:"좋은 데이터 모델의 요소로 보기에 적절하지 않은 것은?",c:["완전성(Completeness)","데이터 재사용(Data Reusability)","반정규화(Denormalization)","간결성(Elegance)"],a:2,ex:"데이터 모델에서 요구되는 필수 조건은 반정규화가 아닌 중복 배제(Non-Redundancy). 반정규화는 성능을 위해 정규화를 일부 해제하는 것으로 좋은 데이터 모델 요소와 거리가 멀다."},
{n:242,q:"요구사항은 모든 사람이 이해할 수 있도록 명확하게 공표됨은 물론 최종 사용자 지향적으로 분명하게 파악되는 수준으로 작성되어야 한다는 것 - 이것은 무엇에 대한 설명인가?",c:["커뮤니케이션 원칙(Communication Principle)","모델링 상세화 원칙(Granularity Principle)","논리적 표현 원칙(Logical Representation Principle)","설계 형식화 원칙(Design Formalization Principle)"],a:0,ex:"커뮤니케이션 원칙: 논리 데이터 모델링의 주목적이 최종 사용자 데이터에 대한 뷰를 개념화하고 추상화하여 시스템 설계자들에게 전달하는 것."},
{n:243,q:"다음의 데이터 모델링 단계에 대한 설명 중 적절하지 않은 것은?",c:["개념 데이터 모델링은 분석 초기에 수행되어 본질적으로 기술과 무관한 사양들의 집합을 상화하여 데이터 요구사항을 정의한다.","개념 모델로부터 논리 모델로, 다시 물리 모델로 가면서 복잡성이 증가하기 때문에, 가급적 개념 데이터 모델에서부터 출발하여 상위 레벨에서 이해하는 것이 바람직하다.","논리 데이터 모델링이 비즈니스 정보의 논리적인 구조와 규칙을 명확하게 표현하는 개념이라면, 물리 데이터 모델링은 테이블, 칼럼 등으로 표현되는 물리적 저장 구조와 저장 장치 등을 정의하는 것이다.","모두 틀림"],a:3,ex:"①~③은 모두 적절한 설명."},
{n:244,q:"개체-관계 모델의 구성 요소로 적절하지 않은 것은?",c:["엔터티","속성","서브타입","도메인"],a:3,ex:"개체-관계 모델의 구성 요소 = 엔터티·속성·식별자·관계·카디날리티·존재 종속·서브타입. 도메인은 포함되지 않음."},
{n:245,q:"객체 지향 모델에서 객체가 다른 객체에 연결되는 방법은?",c:["캡슐화(Encapsulation)","상속(Inheritance)","추상화(Abstraction)","메소드(Methods)"],a:1,ex:"객체는 연관(Association) 또는 상속(Inheritance)을 통해 다른 객체들에 연결됨."},
{n:246,q:"개념 데이터 모델의 중요성을 설명하는 말로 가장 부적절한 것은?",c:["향후에 정의될 논리 및 물리 데이터 모델에 대한 골격을 제공한다.","사용자가 요구하는 데이터의 범위 및 구조 확인을 돕고, 개발 범위 결정을 지원한다.","데이터 아키텍처 상에서 데이터에 대한 최상위 수준의 관점을 정의한다.","선진 사례 적용을 용이하게 한다."],a:2,ex:"데이터 아키텍처 상에서 데이터에 대한 최상위 수준의 관점을 정의한 것은 개괄 데이터 모델. 개념 데이터 모델이 아님."},
{n:247,q:"직렬식 관계의 특징으로 볼 수 없는 것은?",c:["관계들을 관리하는 새로운 엔터티가 추가되어야 한다.","인덱스 수가 감소하고 SQL이 단순해진다.","관계 내용별로 자식 엔터티를 가질 수 있다.","테이블이 될 때 여러 개의 칼럼으로 나열된다."],a:3,ex:"직렬 관계는 테이블이 될 때 여러 개의 로우(Row)로 나누어짐. '여러 개의 칼럼으로 나열된다'는 병렬식 관계의 특징."},
{n:248,q:"논리 데이터 모델링에서 M:M 관계를 두 개의 일대다(1:M) 관계를 갖는 관계 엔터티로 분해하고 진행해야 하는 경우에 해당하는 것은?",c:["관계가 자식을 가져야 할 때","관계가 명확해질 때","M:M 관계에 있는 두 엔터티가 각각 자식을 가질 때","관계가 명확하지 않을 때"],a:0,ex:"M:M 관계를 즉시 분해해야 하는 경우: 관계가 자식을 가져야 할 때 또는 관계가 추가적인 속성을 가져야 할 때."},
{n:249,q:"키 엔터티로 볼 수 없는 것은?",c:["고객","계좌","상품","직종"],a:1,ex:"계좌는 고객이 금융상품에 가입함으로써 생성되는 메인 엔터티. 키 엔터티가 아님."},
{n:250,q:"엔터티 정의 요건으로 가장 부적절한 것은?",c:["관리하고자 하는 것인지 확인한다.","가로와 세로를 가진 면적(집합)인지 확인한다.","대상 개체 간의 독립성이 있는지 확인한다.","순수한 개체이거나 개체가 행위를 하는 행위 집합인지를 확인한다."],a:2,ex:"엔터티 정의 요건에서 대상 개체 간에는 동질성이 있는지 확인해야 하고, 다른 개체와의 구분에서 독립성이 있는지 확인. 즉 ③은 '독립성'이 아닌 '동질성' 확인이 맞음."},

{n:256,q:"논리 데이터 모델을 물리 데이터 모델로 변환하는 과정에서 서브타입을 테이블로 변환하는 방법으로 보기 어려운 것은?",c:["슈퍼타입을 기준으로 하나의 테이블로 변환","서브타입을 기준으로 여러 개의 테이블로 변환","슈퍼타입과 서브타입 각각을 테이블로 변환","서브타입을 기준으로 하나의 테이블로 변환"],a:3,ex:"서브타입을 테이블로 변환하는 방법 = ①슈퍼타입 기준 하나의 테이블 / ②서브타입 기준 여러 개 테이블 / ③슈퍼타입+서브타입 각각 테이블. ④는 해당 없음."},
{n:257,q:"전체 집합에서 임의의 집합을 추출·가공하는 경우가 빈번하고, 복잡한 처리를 하나의 쿼리로 통합하고자 하는 경우 유리한 서브타입 변환 형태는?",c:["슈퍼타입을 기준으로 하나의 테이블로 변환","서브타입을 기준으로 여러 개의 테이블로 변환","슈퍼타입과 서브타입 각각을 테이블로 변환","서브타입을 기준으로 하나의 테이블로 변환"],a:0,ex:"전체 집합에서 임의의 집합을 추출·가공하는 경우 빈번하고 복잡한 처리를 하나의 쿼리로 통합 시 → 슈퍼타입 기준 하나의 테이블로 변환이 유리."},
